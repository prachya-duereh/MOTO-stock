<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เข้าสู่ระบบผู้ดูแล</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      :root{--bg:#eef2f7;--card:#fff;--line:#d8dee8;--text:#111827;--muted:#5c687a;--input:#fff;}
      body.dark{--bg:#0f172a;--card:#111c2f;--line:rgba(148,163,184,.24);--text:#e5edf8;--muted:#93a4bb;--input:#162338;}
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: "Google Sans", sans-serif;
      }
      .page-logo { position: fixed; top: 18px; right: 18px; width: 68px; height: 68px; object-fit: contain; border-radius: 18px; background:var(--card); padding:6px; box-shadow:0 8px 24px rgba(15,23,42,.08); }
      .theme-toggle{position:fixed;top:18px;right:98px;border:0;border-radius:14px;padding:12px 16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;background:#e9eef6;color:var(--text);} body.dark .theme-toggle{background:#1e293b;color:#e5edf8;}
      .card {
        width: 100%;
        max-width: 560px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      }
      .logo {
        width: 110px;
        height: 110px;
        object-fit: contain;
        display: block;
        margin: 0 auto 16px;
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        padding: 10px;
      }
      h1 {
        text-align: center;
        margin: 0 0 8px;
        font-size: 32px;
      }
      .sub {
        text-align: center;
        color: var(--muted);
        margin-bottom: 22px;
      }
      label {
        display: block;
        font-size: 16px;
        font-weight: 700;
        margin: 14px 0 6px;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 18px;
        font-family: "Google Sans", sans-serif;
        outline: none;
      }
      button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 22px;
        font-weight: 800;
        font-family: "Google Sans", sans-serif;
        background: #2f63dc;
        color: #fff;
        cursor: pointer;
      }
      .msg {
        text-align: center;
        margin-top: 14px;
        min-height: 28px;
        font-weight: 600;
      }
      .err { color: #e63232; }
      .ok { color: #18a84b; }
      .hint {
        text-align: center;
        color: #707b8d;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <button type="button" class="theme-toggle" id="themeToggle">🌙 โหมดมืด</button>
    <img src="/logo.jpg" class="page-logo" alt="โลโก้ร้าน" onerror="this.style.display='none'" />
    <div class="card">
      <img src="/logo.jpg" class="logo" alt="logo" onerror="this.style.display='none'" />
      <h1>เข้าสู่ระบบผู้ดูแล</h1>
      <div class="sub">ระบบ POS + สต๊อก + ประวัติการซ่อม</div>

      <form id="loginForm">
        <label>ชื่อผู้ใช้</label>
        <input id="username" autocomplete="username" value="admin" />

        <label>รหัสผ่าน</label>
        <input id="password" type="password" autocomplete="current-password" value="1234" />

        <button type="submit">เข้าสู่ระบบ</button>
      </form>

      <div id="msg" class="msg"></div>
      <div class="hint">เปลี่ยนชื่อผู้ใช้และรหัสผ่านได้ในไฟล์ .env</div>
    </div>

    <script>

    const THEME_KEY = 'motoTheme';
    let currentTheme = localStorage.getItem(THEME_KEY) || 'light';

    function updateThemeToggleText() {
      const toggle = document.getElementById('themeToggle');
      if (!toggle) return;
      toggle.textContent = currentTheme === 'dark' ? '☀️ โหมดสว่าง' : '🌙 โหมดมืด';
    }

    function applyTheme(theme) {
      currentTheme = theme === 'dark' ? 'dark' : 'light';
      document.body.classList.toggle('dark', currentTheme === 'dark');
      localStorage.setItem(THEME_KEY, currentTheme);
      updateThemeToggleText();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

      applyTheme(currentTheme);
      document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);

      async function checkMe() {
        try {
          const res = await fetch("/api/auth/me");
          if (res.ok) {
            // ไม่ redirect อัตโนมัติ เพื่อให้ login ใช้งานได้ปกติ
          }
        } catch (err) {}
      }

      checkMe();

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("msg");
        msg.className = "msg";
        msg.textContent = "กำลังเข้าสู่ระบบ...";

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("username").value.trim(),
              password: document.getElementById("password").value.trim()
            })
          });

          const data = await res.json();

          if (!res.ok || !data.success) {
            throw new Error(data.message || "เข้าสู่ระบบไม่สำเร็จ");
          }

          msg.className = "msg ok";
          msg.textContent = "เข้าสู่ระบบสำเร็จ";

          setTimeout(() => {
            location.href = data.redirectTo || "/admin.html";
          }, 300);
        } catch (err) {
          msg.className = "msg err";
          msg.textContent = err.message || "server ไม่ได้ส่ง JSON กลับมา";
        }
      });
    </script>
  </body>
</html>

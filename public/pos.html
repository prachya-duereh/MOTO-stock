<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าร้าน POS</title>
<style>
:root{--pad:14px;--shadow:0 4px 18px rgba(0,0,0,.08)}
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#222}.page{padding:12px}.topbar,.panel{background:#fff;border-radius:16px;box-shadow:var(--shadow)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;margin-bottom:14px;gap:12px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}
.brand img{width:52px;height:52px;object-fit:contain;border-radius:12px;background:#fff;padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.12)}.brand-title{font-size:18px;font-weight:bold}.brand-sub{font-size:12px;color:#666}
.top-actions{display:flex;gap:10px;flex-wrap:wrap}.top-actions button,.price-type button,.product-card button,.money-grid button,.footer-actions button{border:none;border-radius:12px;cursor:pointer}
.top-actions button{background:#2563eb;color:#fff;padding:11px 14px;font-weight:bold}.layout{display:grid;grid-template-columns:36% 64%;gap:14px}.panel{padding:14px}
.section-title{font-weight:bold;margin-bottom:12px}.search-box input,.money-box input,.scan-box input{width:100%;box-sizing:border-box;padding:13px;border:1px solid #cfd6df;border-radius:12px;font-size:15px;margin-top:6px}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}.product-card{border:1px solid #dbe2ea;border-radius:12px;padding:12px;background:#f8fbff;display:flex;flex-direction:column;justify-content:space-between;min-height:170px}
.product-card .name{font-size:15px;font-weight:bold;margin-bottom:8px}.product-card .sub{color:#555;font-size:13px;line-height:1.5}.product-card button{margin-top:12px;background:#16a34a;color:#fff;padding:10px;font-weight:bold}
.price-type{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}.price-type button{padding:12px;background:#dbeafe;color:#1d4ed8;font-size:14px;font-weight:bold}.price-type button.active{background:#2563eb;color:#fff}
.big-total{font-size:28px;font-weight:bold;padding:10px 12px;border:1px solid #d9e1ea;border-radius:12px;background:#fafcff;margin-bottom:8px}.subtotals{display:grid;gap:6px;margin-bottom:12px;font-size:15px}
.row{display:flex;justify-content:space-between;gap:8px}.cart-table{width:100%;border-collapse:collapse;margin-top:10px}.cart-table th,.cart-table td{border-bottom:1px solid #e5e7eb;padding:8px 6px;text-align:left;vertical-align:top;font-size:14px}
.cart-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.cart-actions button{border:none;padding:6px 8px;border-radius:10px;color:#fff;cursor:pointer;font-size:12px}.btn-minus{background:#f59e0b}.btn-plus{background:#2563eb}.btn-del{background:#dc2626}
.money-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.money-grid button,.footer-actions button{padding:12px;font-size:16px}.money-grid button{background:#e5e7eb}.change-box{font-size:18px;font-weight:bold;margin-top:18px}
.footer-actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.pay-btn{background:#16a34a;color:#fff}.clear-btn{background:#6b7280;color:#fff}.empty-text{color:#666;padding:12px 0;font-size:14px}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.product-grid{grid-template-columns:repeat(2,1fr)}}@media (max-width:640px){.product-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="brand">
      <img src="/logo.jpg" alt="logo">
      <div><div class="brand-title">ดี อะไหล่ กรงปินัง</div><div class="brand-sub">POS สำหรับคอมและ iPad</div></div>
    </div>
    <div class="top-actions"><button onclick="location.href='/admin.html'">หลังบ้าน</button><button onclick="location.href='/repair-history.html'">ประวัติการซ่อม</button><button onclick="logout()" style="background:#dc2626;">ออกจากระบบ</button></div>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="section-title">สแกนบาร์โค้ด</div>
      <div class="scan-box"><input id="barcodeScan" placeholder="ยิงบาร์โค้ดแล้วกด Enter" onkeydown="handleBarcodeEnter(event)"></div>
      <div class="section-title" style="margin-top:18px;">ค้นหาสินค้า</div>
      <div class="search-box"><input id="search" placeholder="ค้นหาชื่อสินค้า / รหัสสินค้า / รุ่น / ปี / ประเภท" oninput="renderItems()"></div>
      <div class="section-title" style="margin-top:22px;">รายการสินค้า</div>
      <div id="productGrid" class="product-grid"></div>
    </div>

    <div class="panel">
      <div class="price-type">
        <button id="btn-retail" class="active" onclick="setPriceType('retail')">ลูกค้าทั่วไป</button>
        <button id="btn-wholesale" onclick="setPriceType('wholesale')">ลูกค้าส่ง</button>
        <button id="btn-mechanic" onclick="setPriceType('mechanic')">ช่าง</button>
      </div>
      <div class="big-total" id="totalText">รวม 0 บาท</div>
      <div class="subtotals">
        <div class="row"><span>ค่าสินค้า</span><span id="subtotalText">0 บาท</span></div>
        <div class="row"><span>ค่าแรง</span><span id="laborText">0 บาท</span></div>
      </div>
      <table class="cart-table">
        <thead><tr><th style="width:8%;">ลำดับ</th><th style="width:16%;">รหัสสินค้า</th><th>รายการ</th><th style="width:12%;">จำนวน</th><th style="width:15%;">ราคา</th><th style="width:18%;">เป็นเงิน</th></tr></thead>
        <tbody id="cartBody"></tbody>
      </table>
      <div class="money-box" style="margin-top:18px;">
        <div class="section-title">ข้อมูลชำระเงิน</div>
        <input id="customerName" placeholder="ชื่อลูกค้า (ไม่บังคับ)">
        <input id="laborCost" type="number" placeholder="ค่าแรง / ค่าบริการเพิ่ม" oninput="renderCart()">
        <input id="paid" type="number" placeholder="ลูกค้าจ่าย (บาท)" oninput="updateChangePreview()">
      </div>
      <div class="money-grid"><button onclick="addPaid(20)">20</button><button onclick="addPaid(50)">50</button><button onclick="addPaid(100)">100</button><button onclick="addPaid(500)">500</button><button onclick="addPaid(1000)">1000</button><button onclick="clearPaid()">ล้าง</button></div>
      <div class="change-box" id="changePreview">เงินทอน: 0 บาท</div>
      <div class="footer-actions"><button class="pay-btn" onclick="checkout()">คิดเงินและพิมพ์ใบเสร็จ</button><button class="clear-btn" onclick="clearCart()">ล้างรายการ</button></div>
    </div>
  </div>
</div>
<script>
let items=[]; let cart=[]; let selectedPriceType='retail';
function $(id){return document.getElementById(id);}
function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});}
async function api(url, options){try{const res=await fetch(url,options);const text=await res.text();let data={};try{data=text?JSON.parse(text):{};}catch{throw new Error(text||'server ส่งข้อมูลไม่ถูกต้อง');}if(!res.ok||data.success===false) throw new Error(data.message||'เกิดข้อผิดพลาด');return data;}catch(err){if(err instanceof TypeError) throw new Error('เชื่อมต่อเซิร์ฟเวอร์หรือฐานข้อมูลไม่สำเร็จ'); throw err;}}
function getPriceLabel(){return selectedPriceType==='wholesale'?'ราคาส่ง':selectedPriceType==='mechanic'?'ราคาช่าง':'ราคาปลีก';}
function getItemPrice(item){if(selectedPriceType==='wholesale') return Number(item.wholesalePrice||0); if(selectedPriceType==='mechanic') return Number(item.mechanicPrice||item.retailPrice||0); return Number(item.retailPrice||0);}
function getLaborCost(){return Number($('laborCost').value)||0;}
function getCartSubtotal(){return cart.reduce((sum,c)=>sum+(c.price*c.qty),0);} function getCartTotal(){return getCartSubtotal()+getLaborCost();}
function setPriceType(type){selectedPriceType=type;['retail','wholesale','mechanic'].forEach(t=>$('btn-'+t).classList.remove('active'));$('btn-'+type).classList.add('active');cart=[];renderCart();renderItems();}
async function loadItems(){items = await api('/api/items'); renderItems();}
function renderItems(){const keyword=$('search').value.trim().toLowerCase(); const grid=$('productGrid'); grid.innerHTML=''; const filtered=items.filter(item=>[item.name,item.barcode,item.category,item.model,item.year].join(' ').toLowerCase().includes(keyword)); if(!filtered.length){grid.innerHTML='<div class="empty-text">ไม่พบสินค้า</div>';return;} filtered.forEach(item=>{const card=document.createElement('div'); card.className='product-card'; card.innerHTML=`<div><div class="name">${item.name||'-'}</div><div class="sub">รหัสสินค้า: ${item.barcode||'-'}</div><div class="sub">ประเภท: ${item.category||'-'}</div><div class="sub">รุ่น: ${item.model||'-'} | ปี: ${item.year||'-'}</div><div class="sub">คงเหลือ: ${item.quantity||0}</div><div class="sub">${getPriceLabel()}: ${money(getItemPrice(item))} บาท</div></div><button onclick="addToCart(${item.id})">เลือกสินค้า</button>`; grid.appendChild(card);});}
function findItem(id){return items.find(i=>i.id==id);} 
function addToCart(id){const item=findItem(id); if(!item) return alert('ไม่พบสินค้า'); if(Number(item.quantity)<=0) return alert('สินค้าหมด'); const found=cart.find(c=>c.id==id); if(found){if(found.qty>=Number(item.quantity)) return alert('จำนวนเกินสต๊อก'); found.qty+=1;} else {cart.push({id:item.id,barcode:item.barcode||'',name:item.name,price:getItemPrice(item),qty:1});} renderCart(); focusScan();}
function handleBarcodeEnter(event){if(event.key!=='Enter') return; const code=event.target.value.trim(); if(!code) return; const item=items.find(i=>String(i.barcode||'').trim()===code); event.target.value=''; if(!item) return alert('ไม่พบบาร์โค้ดนี้ในสต๊อก'); addToCart(item.id);}
function increaseQty(index){const row=cart[index]; const item=findItem(row.id); if(!item) return; if(row.qty>=Number(item.quantity)) return alert('จำนวนเกินสต๊อก'); row.qty+=1; renderCart();}
function decreaseQty(index){const row=cart[index]; if(!row) return; row.qty-=1; if(row.qty<=0) cart.splice(index,1); renderCart();}
function removeCartItem(index){cart.splice(index,1); renderCart();}
function clearCart(){cart=[]; $('customerName').value=''; $('laborCost').value=''; $('paid').value=''; renderCart(); focusScan();}
function renderCart(){const cartBody=$('cartBody'); const subtotalText=$('subtotalText'); const laborText=$('laborText'); const totalText=$('totalText'); cartBody.innerHTML=''; if(!cart.length){cartBody.innerHTML='<tr><td colspan="6">ยังไม่มีสินค้าในตะกร้า</td></tr>'; subtotalText.innerText='0 บาท'; laborText.innerText='0 บาท'; totalText.innerText='รวม 0 บาท'; updateChangePreview(); return;} let subtotal=0; cart.forEach((item,index)=>{const lineTotal=item.price*item.qty; subtotal+=lineTotal; cartBody.innerHTML += `<tr><td>${index+1}</td><td>${item.barcode||'-'}</td><td><b>${item.name}</b><div class="cart-actions"><button class="btn-minus" onclick="decreaseQty(${index})">-</button><button class="btn-plus" onclick="increaseQty(${index})">+</button><button class="btn-del" onclick="removeCartItem(${index})">ลบ</button></div></td><td>${item.qty}</td><td>${money(item.price)}</td><td>${money(lineTotal)}</td></tr>`;}); const labor=getLaborCost(); subtotalText.innerText=money(subtotal)+' บาท'; laborText.innerText=money(labor)+' บาท'; totalText.innerText='รวม '+money(subtotal+labor)+' บาท'; updateChangePreview();}
function addPaid(amount){$('paid').value=(Number($('paid').value)||0)+amount; updateChangePreview();}
function clearPaid(){$('paid').value=''; updateChangePreview();}
function updateChangePreview(){const total=getCartTotal(); const paidValue=Number($('paid').value)||0; const change=paidValue-total; if(paidValue<=0){$('changePreview').innerText='เงินทอน: 0 บาท'; return;} $('changePreview').innerText=change<0?('ขาดอีก: '+money(Math.abs(change))+' บาท'):('เงินทอน: '+money(change)+' บาท');}
function focusScan(){setTimeout(()=>$('barcodeScan')?.focus(),50);} 
async function checkout(){try{if(!cart.length) return alert('ไม่มีสินค้าในตะกร้า'); const payload={customerName:$('customerName').value.trim(),priceType:selectedPriceType,laborCost:getLaborCost(),paid:Number($('paid').value)||0,items:cart.map(c=>({id:c.id,qty:c.qty}))}; const result=await api('/api/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); localStorage.setItem('printData', JSON.stringify({type:'sale', receipt:result.receipt})); window.open('/print.html?v='+Date.now(),'_blank'); clearCart(); await loadItems();}catch(err){alert(err.message);}}
(async function startup(){ try{ await loadItems(); }catch(err){ $('productGrid').innerHTML='<div class="empty-text">'+err.message+'</div>'; } renderCart(); focusScan(); })();

async function logout(){
  try{await fetch('/api/logout',{method:'POST'});}catch{}
  location.href='/login.html';
}
(async function checkAuth(){
  try {
    const res = await fetch('/api/auth/me');
    if(!res.ok) location.href='/login.html';
  } catch {
    location.href='/login.html';
  }
})();

</script>
</body>
</html>

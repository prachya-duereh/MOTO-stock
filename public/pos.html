<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ดี อะไหล่ กรงปินัง</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f3f5f7;
      --text: #0f172a;
      --card: #ffffff;
      --line: #d9e0e7;
      --input-bg: #f8fafc;
      --muted: #64748b;
      --soft: #fbfcfd;
      --shadow-soft: 0 8px 24px rgba(15,23,42,.08);
    }
    body.dark {
      --bg: #0f172a;
      --text: #e5edf8;
      --card: #111c2f;
      --line: rgba(148,163,184,.25);
      --input-bg: #162338;
      --muted: #93a4bb;
      --soft: #122033;
      --shadow-soft: 0 12px 32px rgba(2,6,23,.35);
    }

    body {
      margin: 0;
      font-family: "Google Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .topbar-main { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .topbar-logo { width: 68px; height: 68px; object-fit: contain; border-radius: 18px; background:var(--card); padding:6px; box-shadow:var(--shadow-soft); }
    .nav-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .theme-toggle { border:none; border-radius:12px; padding:10px 16px; font-family:inherit; font-size:15px; font-weight:800; cursor:pointer; background:#e9eef6; color:#0f172a; }
    body.dark .theme-toggle { background:#1e293b; color:#e5edf8; }
    .brand {
      font-size: 28px;
      font-weight: 800;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav a {
      text-decoration: none;
      color: #fff;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(360px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .products-panel {
      height: calc(100vh - 110px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .checkout-panel {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-row input,
    .field input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 17px;
      background: var(--input-bg);
      color: var(--text);
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .products {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1;
  min-height: 0;
  align-content: start;
  padding-right: 4px;
  grid-auto-rows: max-content;
}

.product-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--soft);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 220px;
  height: auto;
  overflow: hidden;
  box-sizing: border-box;
  align-self: start;
}
.product-card button,
.product-card .select-btn {
  margin-top: auto;
  align-self: flex-start;
}

.product-card * {
  box-sizing: border-box;
  min-width: 0;
}

.product-name {
  word-break: break-word;
}
    .product-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
    }
    .product-line {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }
    .product-footer {
      margin-top: auto;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-primary { background: #16a34a; color: #fff; }
    .btn-muted { background: #6b7280; color: #fff; }

    .price-type-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .price-tab {
      height: 52px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .price-tab.active {
      background: #2563eb;
      color: #fff;
    }

    .cart-summary-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin: 14px 0 14px;
      background: var(--soft);
    }
    .cart-total-big {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 28px;
      font-weight: 800;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }
    .cart-total-big strong {
      font-size: 30px;
      font-weight: 800;
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      margin: 6px 0;
    }

    .cart-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 10px;
      text-align: left;
      font-size: 15px;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      font-weight: 800;
      color: var(--muted);
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .qty-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
    }
    .minus-btn { background: #f59e0b; }
    .plus-btn { background: #2563eb; }
    .remove-btn {
      background: #dc2626;
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .payment-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: var(--soft);
      margin-top: 14px;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 6px;
    }

    .quick-money {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 14px;
    }
    .payment-methods {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-bottom:12px;
    }
    .pay-method-btn {
      height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--input-bg);
      color:var(--text);
      font-family:inherit;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .pay-method-btn.active {
      background:#2563eb;
      color:#fff;
      border-color:#2563eb;
    }
    .quick-money button {
      height: 56px;
      border: none;
      border-radius: 14px;
      background: var(--line);
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .money-change {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .checkout-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .scan-status {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
    }
    .scan-status.show { display: block; }
    .scan-status.success { background: #dcfce7; color: #166534; }
    .scan-status.error { background: #fee2e2; color: #991b1b; }
    .cart-row-highlight {
      animation: cartRowFlash 1.6s ease;
      box-shadow: inset 0 0 0 9999px rgba(37, 99, 235, 0.14);
    }
    @keyframes cartRowFlash {
      0% {
        box-shadow: inset 0 0 0 9999px rgba(37, 99, 235, 0.24);
        transform: scale(1);
      }
      25% {
        box-shadow: inset 0 0 0 9999px rgba(37, 99, 235, 0.18);
      }
      100% {
        box-shadow: inset 0 0 0 9999px rgba(37, 99, 235, 0);
        transform: scale(1);
      }
    }

    .status-bar {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }
    .status-bar.show { display: block; }
    .status-edit { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .status-duplicate { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    .empty-box {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: var(--input-bg);
    }

    @media (max-width: 1200px) {
      .layout { grid-template-columns: 1fr; }
      .products-panel, .checkout-panel { height: auto; max-height: none; position: static; overflow: visible; }
      .products { overflow: visible; }
    }

    @media (max-width: 900px) {
      .products { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .container { padding: 12px; }
      .brand { font-size: 22px; }
      .price-type-tabs { grid-template-columns: 1fr; }
      .quick-money { grid-template-columns: repeat(2, 1fr); }
      .checkout-actions { grid-template-columns: 1fr; }
    }
  </style>
    <link rel="stylesheet" href="/ui-enhance.css" />
</head>
<body data-page="pos">
  <div class="container">
    <div class="topbar">
      <div class="topbar-main">
        <div class="brand">หน้าร้าน POS</div>
        <div class="nav">
          <a href="/admin.html">⚙️ หลังบ้าน</a>
          <a href="/report.html">📊 รายงานยอดขาย</a>
          <a href="/repair-history.html">🛠️ ประวัติซ่อม</a>
        </div>
      </div>
      <div class="nav-actions">
        <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 โหมดมืด</button>
        <img src="/D.jpg" class="topbar-logo" alt="โลโก้ร้าน" onerror="this.style.display='none'" />
      </div>
    </div>

    <div id="draftStatus" class="status-bar"></div>

    <div class="layout">
      <div class="panel products-panel">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            placeholder="ค้นหาชื่อสินค้า / รหัสสินค้า / รุ่น / ปี / ประเภท / บาร์โค้ด"
            oninput="renderItems()"
          />
          <input
            type="text"
            id="barcodeInput"
            placeholder="ยิงบาร์โค้ดแล้วกด Enter"
            onkeydown="handleBarcodeEnter(event)"
            autocomplete="off"
            inputmode="none"
          />
        </div>
        <div id="scanStatus" class="scan-status"></div>

        <div class="section-title">รายการสินค้า</div>
        <div id="productList" class="products"></div>
      </div>

      <div class="panel checkout-panel">
        <div class="section-title">เลือกราคาขาย</div>
        <div class="price-type-tabs">
          <button id="tab-retail" class="price-tab active" onclick="setPriceType('retail')">ราคาปลีก</button>
          <button id="tab-wholesale" class="price-tab" onclick="setPriceType('wholesale')">ราคาส่ง</button>
          <button id="tab-mechanic" class="price-tab" onclick="setPriceType('mechanic')">ราคาซ่อม</button>
        </div>

        <div class="cart-table-wrap">
          <table>
            <thead>
              <tr>
                <th>ลำดับ</th>
                <th>รหัสสินค้า</th>
                <th>รายการ</th>
                <th>จำนวน</th>
                <th>ราคา</th>
                <th>เป็นเงิน</th>
              </tr>
            </thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>

        <div class="cart-summary-box">
          <div class="sum-row"><span>ค่าสินค้า</span><strong id="itemsTotalText">0</strong></div>
          <div class="sum-row"><span>ค่าแรง</span><strong id="laborCostText">0</strong></div>
          <div class="sum-row"><span>ส่วนลด</span><strong id="discountText">0</strong></div>
          <div class="cart-total-big"><span>ยอดรวม</span><strong><span id="grandTotalText">0</span> บาท</strong></div>
        </div>

        <div class="payment-box">
          <div class="section-title" style="margin-top:0;">ข้อมูลชำระเงิน</div>

          <div class="field">
            <label for="customerName">ชื่อลูกค้า</label>
            <input type="text" id="customerName" list="customerOptions" placeholder="เลือกลูกค้า หรือพิมพ์ใหม่" />
            <datalist id="customerOptions"></datalist>
          </div>

          <div class="field">
            <label>ช่องทางชำระเงิน</label>
            <div class="payment-methods">
              <button type="button" id="payment-cash" class="pay-method-btn active" onclick="setPaymentMethod('cash')">💵 เงินสด</button>
              <button type="button" id="payment-transfer" class="pay-method-btn" onclick="setPaymentMethod('transfer')">📱 เงินโอน</button>
            </div>
          </div>

          <div class="field">
            <label for="laborCost">ค่าแรง</label>
            <input type="number" id="laborCost" placeholder="0" value="0" oninput="renderCart()" />
          </div>

          <div class="field">
            <label for="discount">ส่วนลด</label>
            <input type="number" id="discount" placeholder="0" value="0" oninput="renderCart()" />
          </div>

          <div class="field">
            <label for="paid">รับเงิน</label>
            <input type="number" id="paid" placeholder="0" value="0" oninput="renderCart()" />
          </div>

          <div class="quick-money">
            <button type="button" onclick="addMoney(20)">20</button>
            <button type="button" onclick="addMoney(50)">50</button>
            <button type="button" onclick="addMoney(100)">100</button>
            <button type="button" onclick="addMoney(500)">500</button>
            <button type="button" onclick="addMoney(1000)">1000</button>
            <button type="button" onclick="clearPaid()">ล้าง</button>
          </div>

          <div class="money-change">เงินทอน: <span id="changeText">0</span> บาท</div>

          <div class="checkout-actions">
            <button class="btn btn-primary" onclick="checkoutSale()">คิดเงินและพิมพ์ใบเสร็จ</button>
            <button class="btn btn-muted" onclick="clearCart()">ล้างรายการ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allItems = [];
    let customers = [];
    let cart = [];
    let currentPriceType = 'retail';
    let editingSaleId = null;
    let editingCreatedAt = null;
    let draftMode = null;
    let scanStatusTimer = null;
    let barcodeInputRefocusTimer = null;
    let cartHighlightTimer = null;
    let lastHighlightedCartKey = '';
    let beepAudioContext = null;
    let paymentMethod = 'cash';


    const THEME_KEY = 'motoTheme';
    let currentTheme = localStorage.getItem(THEME_KEY) || 'light';

    function updateThemeToggleText() {
      const toggle = document.getElementById('themeToggle');
      if (!toggle) return;
      toggle.textContent = currentTheme === 'dark' ? '☀️ โหมดสว่าง' : '🌙 โหมดมืด';
    }

    function applyTheme(theme) {
      currentTheme = theme === 'dark' ? 'dark' : 'light';
      document.body.classList.toggle('dark', currentTheme === 'dark');
      localStorage.setItem(THEME_KEY, currentTheme);
      updateThemeToggleText();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('th-TH');
    }

    function asNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getPriceLabel(priceType) {
      if (priceType === 'wholesale') return 'ราคาส่ง';
      if (priceType === 'mechanic') return 'ราคาซ่อม';
      return 'ราคาปลีก';
    }

    function getItemPrice(item, priceType = currentPriceType) {
      if (priceType === 'wholesale') return asNumber(item.wholesalePrice ?? item.wholesale_price, 0);
      if (priceType === 'mechanic') return asNumber(item.mechanicPrice ?? item.mechanic_price, 0);
      return asNumber(item.retailPrice ?? item.retail_price, 0);
    }

    function getItemStock(item) {
      return asNumber(item.quantity, 0);
    }

    function getCartRowKey(itemId, priceType) {
      return `${Number(itemId)}__${String(priceType || 'retail')}`;
    }

    function highlightCartRow(itemId, priceType) {
      lastHighlightedCartKey = getCartRowKey(itemId, priceType);
      renderCart();

      clearTimeout(cartHighlightTimer);
      cartHighlightTimer = setTimeout(() => {
        lastHighlightedCartKey = '';
        renderCart();
      }, 1600);
    }

    function playScanBeep() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        if (!beepAudioContext) {
          beepAudioContext = new AudioCtx();
        }

        if (beepAudioContext.state === 'suspended') {
          beepAudioContext.resume().catch(() => {});
        }

        const oscillator = beepAudioContext.createOscillator();
        const gainNode = beepAudioContext.createGain();
        const now = beepAudioContext.currentTime;

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1180, now);

        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

        oscillator.connect(gainNode);
        gainNode.connect(beepAudioContext.destination);

        oscillator.start(now);
        oscillator.stop(now + 0.12);
      } catch (error) {
        console.warn('playScanBeep error:', error);
      }
    }

    function updateDraftStatus() {
      const box = document.getElementById('draftStatus');

      if (!draftMode) {
        box.className = 'status-bar';
        box.textContent = '';
        return;
      }

      if (draftMode === 'edit') {
        box.className = 'status-bar show status-edit';
        box.textContent = `กำลังแก้ไขบิล ${editingSaleId || ''} เมื่อบันทึก ระบบจะคืนสต๊อกบิลเดิมแล้วตัดใหม่อัตโนมัติ`;
      } else if (draftMode === 'duplicate') {
        box.className = 'status-bar show status-duplicate';
        box.textContent = 'กำลังทำซ้ำบิลเดิม เมื่อบันทึกจะสร้างบิลใหม่อีกใบ';
      }
    }

    function focusBarcodeInput(selectText = false) {
      const input = document.getElementById('barcodeInput');
      if (!input) return;

      clearTimeout(barcodeInputRefocusTimer);
      barcodeInputRefocusTimer = setTimeout(() => {
        input.focus();
        if (selectText) input.select();
      }, 0);
    }

    function showScanStatus(message, type = 'success') {
      const box = document.getElementById('scanStatus');
      if (!box) return;

      box.textContent = message || '';
      box.className = `scan-status show ${type}`;

      clearTimeout(scanStatusTimer);
      scanStatusTimer = setTimeout(() => {
        box.className = 'scan-status';
        box.textContent = '';
      }, type === 'error' ? 2200 : 1200);
    }

    function addToCartByBarcode(barcode) {
      const cleanBarcode = String(barcode || '').trim();
      if (!cleanBarcode) return false;

      const item = allItems.find(i => String(i.barcode || '').trim() === cleanBarcode);
      if (!item) {
        showScanStatus('ไม่พบบาร์โค้ดนี้ในระบบ', 'error');
        focusBarcodeInput(true);
        return false;
      }

      const result = addToCart(item.id, { silentError: true, source: 'barcode' });
      if (!result?.success) {
        showScanStatus(result?.message || 'เพิ่มสินค้าไม่สำเร็จ', 'error');
        focusBarcodeInput(true);
        return false;
      }

      playScanBeep();
      highlightCartRow(item.id, currentPriceType);
      showScanStatus(`เพิ่ม ${item.name} แล้ว`, 'success');
      focusBarcodeInput(true);
      return true;
    }

    async function loadItems() {
      try {
        const res = await fetch('/api/items');
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'โหลดสินค้าไม่สำเร็จ');
        }

        allItems = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : []);
        renderItems();
      } catch (error) {
        alert(error.message || 'โหลดสินค้าไม่สำเร็จ');
      }
    }


    async function loadCustomers() {
      try {
        const res = await fetch('/api/customers');
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'โหลดลูกค้าไม่สำเร็จ');
        customers = Array.isArray(data) ? data : [];
        renderCustomerOptions();
      } catch (error) {
        customers = [];
        renderCustomerOptions();
      }
    }

    function renderCustomerOptions() {
      const box = document.getElementById('customerOptions');
      if (!box) return;
      box.innerHTML = customers.map(customer => `<option value="${escapeHtml(customer.name || '')}">${escapeHtml(customer.phone || '')}</option>`).join('');
    }

    function setPriceType(type) {
      currentPriceType = type;

      document.getElementById('tab-retail').classList.toggle('active', type === 'retail');
      document.getElementById('tab-wholesale').classList.toggle('active', type === 'wholesale');
      document.getElementById('tab-mechanic').classList.toggle('active', type === 'mechanic');

      renderItems();
    }

    function renderItems() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const list = document.getElementById('productList');

      const filtered = allItems.filter(item => {
        const text = [item.name, item.barcode, item.category, item.model, item.year, item.id].join(' ').toLowerCase();
        return !keyword || text.includes(keyword);
      });

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-box" style="grid-column:1/-1;">ไม่พบสินค้า</div>`;
        return;
      }

      list.innerHTML = filtered.map(item => {
        const stock = getItemStock(item);
        const price = getItemPrice(item, currentPriceType);

        return `
          <div class="product-card">
            <div class="product-name">${escapeHtml(item.name || '-')}</div>
            <div class="product-line">รหัสสินค้า: ${escapeHtml(item.barcode || item.id || '-')}</div>
            <div class="product-line">ประเภท: ${escapeHtml(item.category || '-')}</div>
            <div class="product-line">รุ่น: ${escapeHtml(item.model || '-')} | ปี: ${escapeHtml(item.year || '-')}</div>
            <div class="product-line">คงเหลือ: ${formatNumber(stock)}</div>
            <div class="product-line">${escapeHtml(getPriceLabel(currentPriceType))}: ${formatNumber(price)} บาท</div>
            <div class="product-footer">
              <button class="btn btn-primary" onclick="addToCart(${Number(item.id)})" ${stock <= 0 ? 'disabled' : ''}>เลือกสินค้า</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function addToCart(itemId, options = {}) {
      const item = allItems.find(i => Number(i.id) === Number(itemId));
      if (!item) {
        const message = 'ไม่พบสินค้า';
        if (!options.silentError) alert(message);
        return { success: false, message };
      }

      const stock = getItemStock(item);
      const price = getItemPrice(item, currentPriceType);
      const priceLabel = getPriceLabel(currentPriceType);

      const existing = cart.find(row =>
        Number(row.id) === Number(itemId) &&
        String(row.priceType || '') === String(currentPriceType)
      );

      const usedQtySameItem = cart
        .filter(row => Number(row.id) === Number(itemId))
        .reduce((sum, row) => sum + asNumber(row.qty, 0), 0);

      if (usedQtySameItem + 1 > stock) {
        const message = `สินค้า ${item.name} มีไม่พอในสต๊อก`;
        if (!options.silentError) alert(message);
        return { success: false, message };
      }

      if (existing) {
        existing.qty += 1;
        existing.total = existing.qty * asNumber(existing.price, 0);
      } else {
        cart.push({
          id: Number(item.id),
          barcode: item.barcode || '',
          name: item.name || '',
          qty: 1,
          price,
          total: price,
          priceType: currentPriceType,
          priceLabel
        });
      }

      renderCart();
      if (options.source === 'barcode') focusBarcodeInput(true);
      return { success: true, item };
    }

    function updateQty(itemId, priceType, delta) {
      const row = cart.find(item =>
        Number(item.id) === Number(itemId) &&
        String(item.priceType || '') === String(priceType || '')
      );
      const source = allItems.find(i => Number(i.id) === Number(itemId));
      if (!row || !source) return;

      const nextQty = asNumber(row.qty, 0) + delta;
      if (nextQty <= 0) {
        cart = cart.filter(item =>
          !(Number(item.id) === Number(itemId) && String(item.priceType || '') === String(priceType || ''))
        );
        return renderCart();
      }

      const totalUsedQty = cart
        .filter(item => Number(item.id) === Number(itemId))
        .reduce((sum, item) => {
          if (String(item.priceType || '') === String(priceType || '')) return sum + nextQty;
          return sum + asNumber(item.qty, 0);
        }, 0);

      if (totalUsedQty > getItemStock(source)) {
        return alert(`สินค้า ${source.name} มีไม่พอในสต๊อก`);
      }

      row.qty = nextQty;
      row.total = row.qty * asNumber(row.price, 0);
      renderCart();
    }

    function removeItem(itemId, priceType) {
      cart = cart.filter(item =>
        !(Number(item.id) === Number(itemId) && String(item.priceType || '') === String(priceType || ''))
      );
      renderCart();
    }

    function getItemsTotal() {
      return cart.reduce((sum, item) => sum + asNumber(item.total, 0), 0);
    }

    function getLaborCost() {
      return asNumber(document.getElementById('laborCost').value, 0);
    }

    function getPaid() {
      return asNumber(document.getElementById('paid').value, 0);
    }

    function getDiscount() {
      return asNumber(document.getElementById('discount')?.value, 0);
    }

    function setPaymentMethod(method) {
      paymentMethod = method === 'transfer' ? 'transfer' : 'cash';
      document.getElementById('payment-cash')?.classList.toggle('active', paymentMethod === 'cash');
      document.getElementById('payment-transfer')?.classList.toggle('active', paymentMethod === 'transfer');
      const paidInput = document.getElementById('paid');
      if (paidInput) {
        paidInput.readOnly = paymentMethod === 'transfer';
        paidInput.placeholder = paymentMethod === 'transfer' ? 'ระบบจะบันทึกเป็นยอดโอนเต็มจำนวน' : '0';
      }
      renderCart();
    }

    function getPaymentMethodLabel(method = paymentMethod) {
      return method === 'transfer' ? 'เงินโอน' : 'เงินสด';
    }

    function renderCart() {
      const tbody = document.getElementById('cartBody');
      const itemsTotal = getItemsTotal();
      const laborCost = getLaborCost();
      const rawDiscount = getDiscount();
      const discount = Math.max(0, Math.min(rawDiscount, itemsTotal + laborCost));
      const grandTotal = Math.max(0, itemsTotal + laborCost - discount);
      const paidInput = document.getElementById('paid');
      const discountInput = document.getElementById('discount');
      if (discountInput && Number(discountInput.value || 0) !== discount) {
        discountInput.value = discount;
      }
      let paid = getPaid();
      if (paymentMethod === 'transfer') {
        paid = grandTotal;
        if (paidInput) paidInput.value = grandTotal;
      }
      const change = paymentMethod === 'transfer' ? 0 : (paid - grandTotal);

      if (!cart.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center;color:#64748b;padding:24px;">
              ยังไม่มีสินค้าในตะกร้า
            </td>
          </tr>
        `;
      } else {
        tbody.innerHTML = cart.map((item, index) => `
          <tr class="${getCartRowKey(item.id, item.priceType) === lastHighlightedCartKey ? 'cart-row-highlight' : ''}">
            <td>${index + 1}</td>
            <td>${escapeHtml(item.barcode || item.id || '-')}</td>
            <td>
              <div style="font-weight:800;">${escapeHtml(item.name || '-')}</div>
              <div style="color:#64748b;">${escapeHtml(item.priceLabel || '-')}</div>
            </td>
            <td>
              <div class="qty-controls">
                <button class="qty-btn minus-btn" onclick="updateQty(${Number(item.id)}, '${item.priceType}', -1)">-</button>
                <strong>${formatNumber(item.qty)}</strong>
                <button class="qty-btn plus-btn" onclick="updateQty(${Number(item.id)}, '${item.priceType}', 1)">+</button>
                <button class="remove-btn" onclick="removeItem(${Number(item.id)}, '${item.priceType}')">ลบ</button>
              </div>
            </td>
            <td>${formatNumber(item.price)}</td>
            <td>${formatNumber(item.total)}</td>
          </tr>
        `).join('');
      }

      document.getElementById('itemsTotalText').textContent = formatNumber(itemsTotal);
      document.getElementById('laborCostText').textContent = formatNumber(laborCost);
      document.getElementById('discountText').textContent = formatNumber(discount);
      document.getElementById('grandTotalText').textContent = formatNumber(grandTotal);
      document.getElementById('changeText').textContent = formatNumber(change > 0 ? change : 0);
    }

    function addMoney(amount) {
      if (paymentMethod === 'transfer') return;
      const paidInput = document.getElementById('paid');
      const current = asNumber(paidInput.value, 0);
      paidInput.value = current + asNumber(amount, 0);
      renderCart();
    }

    function clearPaid() {
      if (paymentMethod === 'transfer') return renderCart();
      document.getElementById('paid').value = 0;
      renderCart();
    }

    function clearCart() {
      if (!cart.length && !editingSaleId && !draftMode) return;
      if (!confirm('ต้องการล้างรายการใช่ไหม')) return;

      cart = [];
      editingSaleId = null;
      editingCreatedAt = null;
      draftMode = null;

      document.getElementById('customerName').value = '';
      document.getElementById('laborCost').value = 0;
      document.getElementById('discount').value = 0;
      document.getElementById('paid').value = 0;
      setPaymentMethod('cash');

      updateDraftStatus();
      renderCart();
    }

    async function checkoutSale() {
      try {
        if (!Array.isArray(cart) || !cart.length) {
          return alert('ยังไม่มีสินค้าในตะกร้า');
        }

        const customerName = document.getElementById('customerName')?.value?.trim() || '';
        const laborCost = asNumber(document.getElementById('laborCost')?.value, 0);
        const discount = asNumber(document.getElementById('discount')?.value, 0);
        const paid = asNumber(document.getElementById('paid')?.value, 0);
        const selectedPaymentMethod = paymentMethod;

        if (customerName) {
          try {
            await fetch('/api/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: customerName }) });
          } catch (error) {}
        }

        const payload = {
          customerName,
          laborCost,
          discount,
          paymentMethod: selectedPaymentMethod,
          paid,
          createdAt: editingCreatedAt,
          items: cart.map(item => ({
            id: Number(item.id),
            qty: asNumber(item.qty, 0),
            price: asNumber(item.price, 0),
            total: asNumber(item.total, 0),
            priceType: item.priceType || 'retail',
            priceLabel: item.priceLabel || ''
          }))
        };

        const url = editingSaleId
          ? `/api/sales/${encodeURIComponent(editingSaleId)}`
          : '/api/checkout';

        const method = editingSaleId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.message || 'บันทึกบิลไม่สำเร็จ');
        }

        const receipt = result.receipt || null;

        if (receipt) {
          try {
            localStorage.setItem('lastReceipt', JSON.stringify(receipt));
            sessionStorage.setItem('lastReceipt', JSON.stringify(receipt));
            localStorage.setItem('printReceipt', JSON.stringify(receipt));
            sessionStorage.setItem('printReceipt', JSON.stringify(receipt));
            localStorage.setItem('printReceiptData', JSON.stringify(receipt));
            sessionStorage.setItem('printReceiptData', JSON.stringify(receipt));
          } catch (error) {}
        }
        window.open('/print.html?autoprint=1&type=sale', '_blank');
        
        alert(method === 'PUT' ? 'แก้ไขบิลเรียบร้อย' : 'คิดเงินสำเร็จ');

        editingSaleId = null;
        editingCreatedAt = null;
        draftMode = null;
        updateDraftStatus();

        cart = [];
        document.getElementById('customerName').value = '';
        document.getElementById('laborCost').value = 0;
        document.getElementById('discount').value = 0;
        document.getElementById('paid').value = 0;
        setPaymentMethod('cash');

        renderCart();
        await loadItems();

      } catch (error) {
        alert(error.message || 'บันทึกบิลไม่สำเร็จ');
      }
    }

    async function handleBarcodeEnter(event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();

      const input = document.getElementById('barcodeInput');
      const barcode = input.value.trim();
      if (!barcode) return;

      input.value = '';
      addToCartByBarcode(barcode);
    }

    function loadDraftSaleFromStorage() {
      try {
        const raw = localStorage.getItem('posDraftSale');
        if (!raw) return;

        const draft = JSON.parse(raw);
        if (!draft || !Array.isArray(draft.items)) return;

        draftMode = draft.mode || null;
        editingSaleId = draft.mode === 'edit' ? (draft.saleId || null) : null;
        editingCreatedAt = draft.mode === 'edit' ? (draft.createdAt || null) : null;

        document.getElementById('customerName').value = draft.customerName || '';
        document.getElementById('laborCost').value = asNumber(draft.laborCost, 0);
        document.getElementById('discount').value = asNumber(draft.discount, 0);
        document.getElementById('paid').value = asNumber(draft.paid, 0);
        setPaymentMethod(draft.paymentMethod || 'cash');

        cart = draft.items.map(item => ({
          id: Number(item.id),
          barcode: item.barcode || '',
          name: item.name || '',
          qty: asNumber(item.qty, 0),
          price: asNumber(item.price, 0),
          total: asNumber(item.total, 0),
          priceType: item.priceType || 'retail',
          priceLabel: item.priceLabel || getPriceLabel(item.priceType || 'retail')
        }));

        localStorage.removeItem('posDraftSale');
        updateDraftStatus();
        renderCart();
      } catch (error) {
        console.error('loadDraftSaleFromStorage error:', error);
      }
    }

    async function hydrateDraftItemNames() {
      if (!cart.length || !allItems.length) return;

      cart = cart.map(row => {
        const item = allItems.find(i => Number(i.id) === Number(row.id));
        if (!item) return row;

        return {
          ...row,
          barcode: row.barcode || item.barcode || '',
          name: row.name || item.name || '',
          total: asNumber(row.qty, 0) * asNumber(row.price, 0)
        };
      });

      renderCart();
    }

    async function initPage() {
      applyTheme(currentTheme);
      setPaymentMethod('cash');
      updateDraftStatus();
      renderCart();
      await loadItems();
      await loadCustomers();
      loadDraftSaleFromStorage();
      await hydrateDraftItemNames();
      renderItems();
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>

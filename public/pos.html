<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หน้าร้าน POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      background: #f3f5f7;
      color: #0f172a;
    }
    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .brand {
      font-size: 28px;
      font-weight: 800;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav a {
      text-decoration: none;
      color: #fff;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid #d9e0e7;
      border-radius: 22px;
      padding: 16px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-row input,
    .field input {
      width: 100%;
      height: 52px;
      border: 1px solid #cfd8e3;
      border-radius: 14px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 17px;
      background: #f8fafc;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 14px;
    }

    .product-card {
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      background: #fbfcfd;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 220px;
    }
    .product-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
    }
    .product-line {
      font-size: 15px;
      color: #334155;
      line-height: 1.6;
    }
    .product-footer {
      margin-top: auto;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-primary { background: #16a34a; color: #fff; }
    .btn-secondary { background: #2563eb; color: #fff; }
    .btn-muted { background: #6b7280; color: #fff; }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .price-type-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .price-tab {
      height: 52px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .price-tab.active {
      background: #2563eb;
      color: #fff;
    }

    .cart-summary-box {
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fbfcfd;
    }
    .cart-total-big {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      margin: 6px 0;
    }

    .cart-table-wrap {
      overflow-x: auto;
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      background: #fff;
      margin-bottom: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 10px;
      text-align: left;
      font-size: 15px;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      font-weight: 800;
      color: #334155;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .qty-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
    }
    .minus-btn { background: #f59e0b; }
    .plus-btn { background: #2563eb; }
    .remove-btn {
      background: #dc2626;
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .payment-box {
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      padding: 14px;
      background: #fbfcfd;
      margin-top: 14px;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 6px;
    }

    .quick-money {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 14px;
    }
    .quick-money button {
      height: 56px;
      border: none;
      border-radius: 14px;
      background: #e5e7eb;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .money-change {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .checkout-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .status-bar {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }
    .status-bar.show { display: block; }
    .status-edit { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .status-duplicate { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    .empty-box {
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      color: #64748b;
      background: #f8fafc;
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .products {
        grid-template-columns: 1fr;
      }
      .search-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container { padding: 12px; }
      .brand { font-size: 22px; }
      .price-type-tabs {
        grid-template-columns: 1fr;
      }
      .quick-money {
        grid-template-columns: repeat(2, 1fr);
      }
      .checkout-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">หน้าร้าน POS</div>
      <div class="nav">
        <a href="/admin.html">⚙️ หลังบ้าน</a>
        <a href="/report.html">📊 รายงานยอดขาย</a>
        <a href="/repair-history.html">🛠️ ประวัติซ่อม</a>
      </div>
    </div>

    <div id="draftStatus" class="status-bar"></div>

    <div class="layout">
      <div class="panel">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            placeholder="ค้นหาชื่อสินค้า / รหัสสินค้า / รุ่น / ปี / ประเภท / บาร์โค้ด"
            oninput="renderItems()"
          />
          <input
            type="text"
            id="barcodeInput"
            placeholder="ยิงบาร์โค้ดแล้วกด Enter"
            onkeydown="handleBarcodeEnter(event)"
          />
        </div>

        <div class="section-title">รายการสินค้า</div>
        <div id="productList" class="products"></div>
      </div>

      <div class="panel">
        <div class="section-title">เลือกราคาขาย</div>
        <div class="price-type-tabs">
          <button id="tab-retail" class="price-tab active" onclick="setPriceType('retail')">ลูกค้าทั่วไป</button>
          <button id="tab-wholesale" class="price-tab" onclick="setPriceType('wholesale')">ลูกค้าส่ง</button>
          <button id="tab-mechanic" class="price-tab" onclick="setPriceType('mechanic')">ช่าง</button>
        </div>

        <div class="cart-summary-box">
          <div class="cart-total-big">รวม <span id="grandTotalText">0</span> บาท</div>
          <div class="sum-row"><span>ค่าสินค้า</span><strong id="itemsTotalText">0</strong></div>
          <div class="sum-row"><span>ค่าแรง</span><strong id="laborCostText">0</strong></div>
        </div>

        <div class="cart-table-wrap">
          <table>
            <thead>
              <tr>
                <th>ลำดับ</th>
                <th>รหัสสินค้า</th>
                <th>รายการ</th>
                <th>จำนวน</th>
                <th>ราคา</th>
                <th>เป็นเงิน</th>
              </tr>
            </thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>

        <div class="payment-box">
          <div class="section-title" style="margin-top:0;">ข้อมูลชำระเงิน</div>

          <div class="field">
            <label for="customerName">ชื่อลูกค้า</label>
            <input type="text" id="customerName" placeholder="ชื่อลูกค้า" />
          </div>

          <div class="field">
            <label for="laborCost">ค่าแรง</label>
            <input type="number" id="laborCost" placeholder="0" value="0" oninput="renderCart()" />
          </div>

          <div class="field">
            <label for="paid">รับเงิน</label>
            <input type="number" id="paid" placeholder="0" value="0" oninput="renderCart()" />
          </div>

          <div class="quick-money">
            <button type="button" onclick="addMoney(20)">20</button>
            <button type="button" onclick="addMoney(50)">50</button>
            <button type="button" onclick="addMoney(100)">100</button>
            <button type="button" onclick="addMoney(500)">500</button>
            <button type="button" onclick="addMoney(1000)">1000</button>
            <button type="button" onclick="clearPaid()">ล้าง</button>
          </div>

          <div class="money-change">เงินทอน: <span id="changeText">0</span> บาท</div>

          <div class="checkout-actions">
            <button class="btn btn-primary" onclick="checkoutSale()">คิดเงินและพิมพ์ใบเสร็จ</button>
            <button class="btn btn-muted" onclick="clearCart()">ล้างรายการ</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allItems = [];
    let cart = [];
    let currentPriceType = 'retail';
    let editingSaleId = null;
    let editingCreatedAt = null;
    let draftMode = null;

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('th-TH');
    }

    function asNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getPriceLabel(priceType) {
      if (priceType === 'wholesale') return 'ราคาส่ง';
      if (priceType === 'mechanic') return 'ราคาช่าง';
      return 'ราคาปลีก';
    }

    function getItemPrice(item, priceType = currentPriceType) {
      if (priceType === 'wholesale') {
        return asNumber(item.wholesalePrice ?? item.wholesale_price, 0);
      }
      if (priceType === 'mechanic') {
        return asNumber(item.mechanicPrice ?? item.mechanic_price, 0);
      }
      return asNumber(item.retailPrice ?? item.retail_price, 0);
    }

    function getItemStock(item) {
      return asNumber(item.quantity, 0);
    }

    function updateDraftStatus() {
      const box = document.getElementById('draftStatus');

      if (!draftMode) {
        box.className = 'status-bar';
        box.textContent = '';
        return;
      }

      if (draftMode === 'edit') {
        box.className = 'status-bar show status-edit';
        box.textContent = `กำลังแก้ไขบิล ${editingSaleId || ''} เมื่อบันทึก ระบบจะคืนสต๊อกบิลเดิมแล้วตัดใหม่อัตโนมัติ`;
      } else if (draftMode === 'duplicate') {
        box.className = 'status-bar show status-duplicate';
        box.textContent = 'กำลังทำซ้ำบิลเดิม เมื่อบันทึกจะสร้างบิลใหม่อีกใบ';
      }
    }

    async function loadItems() {
      try {
        const res = await fetch('/api/items');
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'โหลดสินค้าไม่สำเร็จ');
        }

        allItems = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : []);
        renderItems();
      } catch (error) {
        alert(error.message || 'โหลดสินค้าไม่สำเร็จ');
      }
    }

    function setPriceType(type) {
      currentPriceType = type;

      document.getElementById('tab-retail').classList.toggle('active', type === 'retail');
      document.getElementById('tab-wholesale').classList.toggle('active', type === 'wholesale');
      document.getElementById('tab-mechanic').classList.toggle('active', type === 'mechanic');

      renderItems();
    }

    function renderItems() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const list = document.getElementById('productList');

      const filtered = allItems.filter(item => {
        const text = [
          item.name,
          item.barcode,
          item.category,
          item.model,
          item.year,
          item.id
        ].join(' ').toLowerCase();

        return !keyword || text.includes(keyword);
      });

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-box" style="grid-column:1/-1;">ไม่พบสินค้า</div>`;
        return;
      }

      list.innerHTML = filtered.map(item => {
        const stock = getItemStock(item);
        const price = getItemPrice(item, currentPriceType);

        return `
          <div class="product-card">
            <div class="product-name">${escapeHtml(item.name || '-')}</div>
            <div class="product-line">รหัสสินค้า: ${escapeHtml(item.barcode || item.id || '-')}</div>
            <div class="product-line">ประเภท: ${escapeHtml(item.category || '-')}</div>
            <div class="product-line">รุ่น: ${escapeHtml(item.model || '-')} | ปี: ${escapeHtml(item.year || '-')}</div>
            <div class="product-line">คงเหลือ: ${formatNumber(stock)}</div>
            <div class="product-line">${escapeHtml(getPriceLabel(currentPriceType))}: ${formatNumber(price)} บาท</div>
            <div class="product-footer">
              <button
                class="btn btn-primary"
                onclick="addToCart(${Number(item.id)})"
                ${stock <= 0 ? 'disabled' : ''}
              >
                เลือกสินค้า
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function addToCart(itemId) {
      const item = allItems.find(i => Number(i.id) === Number(itemId));
      if (!item) return alert('ไม่พบสินค้า');

      const stock = getItemStock(item);
      const price = getItemPrice(item, currentPriceType);
      const priceLabel = getPriceLabel(currentPriceType);

      const existing = cart.find(row =>
        Number(row.id) === Number(itemId) &&
        String(row.priceType || '') === String(currentPriceType)
      );

      const usedQtySameItem = cart
        .filter(row => Number(row.id) === Number(itemId))
        .reduce((sum, row) => sum + asNumber(row.qty, 0), 0);

      if (usedQtySameItem + 1 > stock) {
        return alert(`สินค้า ${item.name} มีไม่พอในสต๊อก`);
      }

      if (existing) {
        existing.qty += 1;
        existing.total = existing.qty * asNumber(existing.price, 0);
      } else {
        cart.push({
          id: Number(item.id),
          barcode: item.barcode || '',
          name: item.name || '',
          qty: 1,
          price,
          total: price,
          priceType: currentPriceType,
          priceLabel
        });
      }

      renderCart();
    }

    function updateQty(itemId, priceType, delta) {
      const row = cart.find(item =>
        Number(item.id) === Number(itemId) &&
        String(item.priceType || '') === String(priceType || '')
      );
      const source = allItems.find(i => Number(i.id) === Number(itemId));

      if (!row || !source) return;

      const nextQty = asNumber(row.qty, 0) + delta;

      if (nextQty <= 0) {
        cart = cart.filter(item =>
          !(Number(item.id) === Number(itemId) && String(item.priceType || '') === String(priceType || ''))
        );
        return renderCart();
      }

      const totalUsedQty = cart
        .filter(item => Number(item.id) === Number(itemId))
        .reduce((sum, item) => {
          if (String(item.priceType || '') === String(priceType || '')) {
            return sum + nextQty;
          }
          return sum + asNumber(item.qty, 0);
        }, 0);

      if (totalUsedQty > getItemStock(source)) {
        return alert(`สินค้า ${source.name} มีไม่พอในสต๊อก`);
      }

      row.qty = nextQty;
      row.total = row.qty * asNumber(row.price, 0);
      renderCart();
    }

    function removeItem(itemId, priceType) {
      cart = cart.filter(item =>
        !(Number(item.id) === Number(itemId) && String(item.priceType || '') === String(priceType || ''))
      );
      renderCart();
    }

    function getItemsTotal() {
      return cart.reduce((sum, item) => sum + asNumber(item.total, 0), 0);
    }

    function getLaborCost() {
      return asNumber(document.getElementById('laborCost').value, 0);
    }

    function getPaid() {
      return asNumber(document.getElementById('paid').value, 0);
    }

    function renderCart() {
      const tbody = document.getElementById('cartBody');
      const itemsTotal = getItemsTotal();
      const laborCost = getLaborCost();
      const grandTotal = itemsTotal + laborCost;
      const paid = getPaid();
      const change = paid - grandTotal;

      if (!cart.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center;color:#64748b;padding:24px;">
              ยังไม่มีสินค้าในตะกร้า
            </td>
          </tr>
        `;
      } else {
        tbody.innerHTML = cart.map((item, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${escapeHtml(item.barcode || item.id || '-')}</td>
            <td>
              <div style="font-weight:800;">${escapeHtml(item.name || '-')}</div>
              <div style="color:#64748b;">${escapeHtml(item.priceLabel || '-')}</div>
            </td>
            <td>
              <div class="qty-controls">
                <button class="qty-btn minus-btn" onclick="updateQty(${Number(item.id)}, '${item.priceType}', -1)">-</button>
                <strong>${formatNumber(item.qty)}</strong>
                <button class="qty-btn plus-btn" onclick="updateQty(${Number(item.id)}, '${item.priceType}', 1)">+</button>
                <button class="remove-btn" onclick="removeItem(${Number(item.id)}, '${item.priceType}')">ลบ</button>
              </div>
            </td>
            <td>${formatNumber(item.price)}</td>
            <td>${formatNumber(item.total)}</td>
          </tr>
        `).join('');
      }

      document.getElementById('itemsTotalText').textContent = formatNumber(itemsTotal);
      document.getElementById('laborCostText').textContent = formatNumber(laborCost);
      document.getElementById('grandTotalText').textContent = formatNumber(grandTotal);
      document.getElementById('changeText').textContent = formatNumber(change > 0 ? change : 0);
    }

    function addMoney(amount) {
      const paidInput = document.getElementById('paid');
      const current = asNumber(paidInput.value, 0);
      paidInput.value = current + asNumber(amount, 0);
      renderCart();
    }

    function clearPaid() {
      document.getElementById('paid').value = 0;
      renderCart();
    }

    function clearCart() {
      if (!cart.length && !editingSaleId && !draftMode) return;
      if (!confirm('ต้องการล้างรายการใช่ไหม')) return;

      cart = [];
      editingSaleId = null;
      editingCreatedAt = null;
      draftMode = null;

      document.getElementById('customerName').value = '';
      document.getElementById('laborCost').value = 0;
      document.getElementById('paid').value = 0;

      updateDraftStatus();
      renderCart();
    }

    async function checkoutSale() {
      try {
        if (!Array.isArray(cart) || !cart.length) {
          return alert('ยังไม่มีสินค้าในตะกร้า');
        }

        const customerName = document.getElementById('customerName')?.value?.trim() || '';
        const laborCost = asNumber(document.getElementById('laborCost')?.value, 0);
        const paid = asNumber(document.getElementById('paid')?.value, 0);

        const payload = {
          customerName,
          laborCost,
          paid,
          createdAt: editingCreatedAt,
          items: cart.map(item => ({
            id: Number(item.id),
            qty: asNumber(item.qty, 0),
            price: asNumber(item.price, 0),
            total: asNumber(item.total, 0),
            priceType: item.priceType || 'retail',
            priceLabel: item.priceLabel || ''
          }))
        };

        const url = editingSaleId
          ? `/api/sales/${encodeURIComponent(editingSaleId)}`
          : '/api/checkout';

        const method = editingSaleId ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.message || 'บันทึกบิลไม่สำเร็จ');
        }

        const receipt = result.receipt || null;
        const saleId = receipt?.saleId || receipt?.id || '';

        if (receipt) {
          try {
            localStorage.setItem('lastReceipt', JSON.stringify(receipt));
            sessionStorage.setItem('lastReceipt', JSON.stringify(receipt));
          } catch (error) {}
        }

        alert(method === 'PUT' ? 'แก้ไขบิลเรียบร้อย' : 'คิดเงินสำเร็จ');

        editingSaleId = null;
        editingCreatedAt = null;
        draftMode = null;
        updateDraftStatus();

        cart = [];
        document.getElementById('customerName').value = '';
        document.getElementById('laborCost').value = 0;
        document.getElementById('paid').value = 0;

        renderCart();
        await loadItems();

        if (saleId) {
          window.open(`/print.html?saleId=${encodeURIComponent(saleId)}`, '_blank');
        } else {
          window.open('/print.html', '_blank');
        }
      } catch (error) {
        alert(error.message || 'บันทึกบิลไม่สำเร็จ');
      }
    }

    async function handleBarcodeEnter(event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();

      const barcode = document.getElementById('barcodeInput').value.trim();
      if (!barcode) return;

      const item = allItems.find(i => String(i.barcode || '').trim() === barcode);
      if (!item) {
        alert('ไม่พบบาร์โค้ดนี้ในระบบ');
        return;
      }

      addToCart(item.id);
      document.getElementById('barcodeInput').value = '';
    }

    function loadDraftSaleFromStorage() {
      try {
        const raw = localStorage.getItem('posDraftSale');
        if (!raw) return;

        const draft = JSON.parse(raw);
        if (!draft || !Array.isArray(draft.items)) return;

        draftMode = draft.mode || null;
        editingSaleId = draft.mode === 'edit' ? (draft.saleId || null) : null;
        editingCreatedAt = draft.mode === 'edit' ? (draft.createdAt || null) : null;

        document.getElementById('customerName').value = draft.customerName || '';
        document.getElementById('laborCost').value = asNumber(draft.laborCost, 0);
        document.getElementById('paid').value = asNumber(draft.paid, 0);

        cart = draft.items.map(item => ({
          id: Number(item.id),
          barcode: item.barcode || '',
          name: item.name || '',
          qty: asNumber(item.qty, 0),
          price: asNumber(item.price, 0),
          total: asNumber(item.total, 0),
          priceType: item.priceType || 'retail',
          priceLabel: item.priceLabel || getPriceLabel(item.priceType || 'retail')
        }));

        localStorage.removeItem('posDraftSale');
        updateDraftStatus();
        renderCart();
      } catch (error) {
        console.error('loadDraftSaleFromStorage error:', error);
      }
    }

    async function hydrateDraftItemNames() {
      if (!cart.length || !allItems.length) return;

      cart = cart.map(row => {
        const item = allItems.find(i => Number(i.id) === Number(row.id));
        if (!item) return row;

        return {
          ...row,
          barcode: row.barcode || item.barcode || '',
          name: row.name || item.name || '',
          total: asNumber(row.qty, 0) * asNumber(row.price, 0)
        };
      });

      renderCart();
    }

    async function initPage() {
      updateDraftStatus();
      renderCart();
      await loadItems();
      loadDraftSaleFromStorage();
      await hydrateDraftItemNames();
      renderItems();
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <link rel="icon" type="image/jpg" href="D.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>หน้าร้าน POS</title>
    <style>
      * { box-sizing: border-box; font-family: "Kanit", sans-serif; }
      body { margin: 0; background: #eef2f7; color: #1f2937; }
      .page { padding: 14px; }
      .topbar, .panel { background: #fff; border-radius: 18px; box-shadow: 0 4px 16px rgba(0,0,0,.07); }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; padding:14px 18px; margin-bottom:14px; }
      .brand { display:flex; align-items:center; gap:12px; }
      .brand img { width:52px; height:52px; object-fit:contain; border-radius:12px; background:#fff; }
      .brand-title { font-size: 20px; font-weight:700; }
      .brand-sub { color:#6b7280; font-size:13px; }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      button { border:none; border-radius:12px; cursor:pointer; }
      .nav button { padding:11px 14px; color:#fff; background:#2563eb; }
      .layout { display:grid; grid-template-columns: 38% 62%; gap:14px; }
      .panel { padding:14px; }
      .section-title { font-weight:700; margin-bottom:8px; }
      input, select { width:100%; padding:13px; border:1px solid #d5dbe4; border-radius:12px; font-size:15px; background:#fff; }
      .row { display:flex; justify-content:space-between; gap:10px; }
      .split { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
      .scan-tip { color:#6b7280; font-size:12px; margin-top:6px; }
      .price-mode { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom:12px; }
      .price-mode button { padding:12px; font-weight:700; background:#dbeafe; color:#1d4ed8; }
      .price-mode .active { background:#2563eb; color:#fff; }
      .paper-row { display:grid; grid-template-columns: 1fr 180px 150px; gap:10px; margin-bottom:12px; }
      .paper-row button { background:#0ea5e9; color:#fff; padding:12px; }
      .summary-box { border:1px solid #dbe3ec; border-radius:14px; background:#f8fbff; padding:12px; margin-bottom:12px; }
      .total-big { font-size: 30px; font-weight:700; }
      .muted { color:#6b7280; }
      .product-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-top:12px; }
      .product-card { border:1px solid #e5e7eb; border-radius:14px; padding:12px; background:#fbfdff; }
      .product-card .name { font-weight:700; margin-bottom:6px; }
      .product-card .sub { font-size:13px; color:#4b5563; line-height:1.45; }
      .product-card button { width:100%; margin-top:10px; background:#16a34a; color:#fff; padding:10px; font-weight:700; }
      .cart-table { width:100%; border-collapse:collapse; }
      .cart-table th, .cart-table td { border-bottom:1px solid #e5e7eb; padding:8px 6px; vertical-align:top; font-size:14px; }
      .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; background:#e5e7eb; margin-top:4px; }
      .actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
      .actions button { color:#fff; padding:7px 9px; font-size:12px; }
      .minus { background:#f59e0b; } .plus { background:#2563eb; } .remove { background:#dc2626; }
      .money-grid, .footer-actions { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-top:12px; }
      .money-grid button { background:#e5e7eb; padding:12px; font-weight:600; }
      .footer-actions { grid-template-columns: 2fr 1fr 1fr; }
      .footer-actions button { padding:13px; font-weight:700; color:#fff; }
      .pay { background:#16a34a; } .clear { background:#6b7280; } .reprint { background:#0f766e; }
      .change-box { font-size:18px; font-weight:700; margin-top:12px; }
      .danger { color:#dc2626; }
      @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
      @media (max-width: 720px) { .product-grid { grid-template-columns: 1fr; } .paper-row, .split, .money-grid, .footer-actions { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div class="brand">
          <img src="/logo.jpg" alt="logo" />
          <div>
            <div class="brand-title">ดี อะไหล่ กรงปินัง</div>
            <div class="brand-sub">หน้าร้าน POS</div>
          </div>
        </div>
        <div class="nav">
          <button onclick="location.href='/admin.html'">หลังบ้าน</button>
          <button onclick="location.href='/report.html'">รายงาน</button>
          <button onclick="location.href='/repair-history.html'">ประวัติการซ่อม</button>
          <button onclick="logout()" style="background:#dc2626">ออกจากระบบ</button>
        </div>
      </div>

      <div class="layout">
        <div class="panel">
          <div class="section-title">ยิงบาร์โค้ดแล้วเข้าเลย</div>
          <input id="barcodeScan" placeholder="ยิงบาร์โค้ดแล้วกด Enter" onkeydown="handleBarcodeEnter(event)" />
          <div class="scan-tip">สแกนซ้ำ = เพิ่มจำนวนอัตโนมัติ</div>

          <div class="section-title" style="margin-top:16px">ค้นหาสินค้า</div>
          <input id="search" placeholder="ค้นหาชื่อสินค้า / รหัส / รุ่น / ปี / หมายเหตุ" oninput="renderItems()" />

          <div class="section-title" style="margin-top:16px">สินค้าในระบบ</div>
          <div id="productGrid" class="product-grid"></div>
        </div>

        <div class="panel">
          <div class="price-mode">
            <button id="btn-retail" class="active" onclick="setPriceType('retail')">ลูกค้าทั่วไป</button>
            <button id="btn-wholesale" onclick="setPriceType('wholesale')">ลูกค้าส่ง</button>
            <button id="btn-mechanic" onclick="setPriceType('mechanic')">ช่าง</button>
          </div>

          <div class="paper-row">
            <input id="customerName" placeholder="ชื่อลูกค้า (ไม่บังคับ)" />
            <select id="paperSize" onchange="savePaperSize()">
              <option value="58">ใบเสร็จ 58 mm</option>
              <option value="80">ใบเสร็จ 80 mm</option>
            </select>
            <button onclick="setPaidExact()">รับพอดี</button>
          </div>

          <div class="summary-box">
            <div class="total-big" id="totalText">รวม 0 บาท</div>
            <div class="row"><span>ค่าสินค้า</span><span id="subtotalText">0 บาท</span></div>
            <div class="row"><span>ค่าแรง</span><span id="laborText">0 บาท</span></div>
          </div>

          <table class="cart-table">
            <thead>
              <tr>
                <th style="width:7%">#</th>
                <th style="width:16%">รหัส</th>
                <th>รายการ</th>
                <th style="width:11%">จำนวน</th>
                <th style="width:14%">ราคา</th>
                <th style="width:16%">รวม</th>
              </tr>
            </thead>
            <tbody id="cartBody"></tbody>
          </table>

          <div class="split" style="margin-top:14px">
            <input id="laborCost" type="number" placeholder="ค่าแรง / ค่าบริการเพิ่ม" oninput="renderCart()" />
            <input id="paid" type="number" placeholder="ลูกค้าจ่าย" oninput="updateChangePreview()" />
          </div>

          <div class="money-grid">
            <button onclick="addPaid(20)">20</button>
            <button onclick="addPaid(50)">50</button>
            <button onclick="addPaid(100)">100</button>
            <button onclick="addPaid(500)">500</button>
            <button onclick="addPaid(1000)">1000</button>
            <button onclick="roundPaid()">ปัดขึ้น</button>
          </div>

          <div class="change-box" id="changePreview">เงินทอน: 0 บาท</div>

          <div class="footer-actions">
            <button class="pay" onclick="checkout()">คิดเงินและพิมพ์ใบเสร็จ</button>
            <button class="reprint" onclick="reprintLastReceipt()">พิมพ์ซ้ำ</button>
            <button class="clear" onclick="clearCart()">ล้างรายการ</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let items = [];
      let cart = [];
      let selectedPriceType = "retail";
      let lastReceipt = null;

      function $(id) { return document.getElementById(id); }
      function money(n) {
        return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      }
      async function api(url, options) {
        const res = await fetch(url, options);
        const text = await res.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { throw new Error(text || 'server ส่งข้อมูลไม่ถูกต้อง'); }
        if (!res.ok || data.success === false) throw new Error(data.message || 'เกิดข้อผิดพลาด');
        return data;
      }
      function getPriceLabel(type = selectedPriceType) {
        return type === 'wholesale' ? 'ราคาส่ง' : type === 'mechanic' ? 'ราคาช่าง' : 'ราคาปลีก';
      }
      function getItemPrice(item, type = selectedPriceType) {
        if (type === 'wholesale') return Number(item.wholesalePrice || 0);
        if (type === 'mechanic') return Number(item.mechanicPrice || item.retailPrice || 0);
        return Number(item.retailPrice || 0);
      }
      function savePaperSize() { localStorage.setItem('paperSize', $('paperSize').value); }
      function getPaperSize() { return localStorage.getItem('paperSize') || '58'; }
      function setPriceType(type) {
        selectedPriceType = type;
        ['retail','wholesale','mechanic'].forEach((t) => $('btn-' + t).classList.remove('active'));
        $('btn-' + type).classList.add('active');
        renderItems();
        renderCart();
        focusScan();
      }
      async function loadItems() {
        items = await api('/api/items');
        renderItems();
      }
      function findItem(id) { return items.find((i) => i.id == id); }
      function renderItems() {
        const keyword = $('search').value.trim().toLowerCase();
        const filtered = items.filter((item) => [item.name, item.barcode, item.category, item.model, item.year, item.note].join(' ').toLowerCase().includes(keyword));
        const grid = $('productGrid');
        grid.innerHTML = '';
        if (!filtered.length) {
          grid.innerHTML = '<div class="muted">ไม่พบสินค้า</div>';
          return;
        }
        filtered.forEach((item) => {
          const low = Number(item.minStock || 0) > 0 && Number(item.quantity || 0) <= Number(item.minStock || 0);
          const price = getItemPrice(item, selectedPriceType);
          const card = document.createElement('div');
          card.className = 'product-card';
          card.innerHTML = `
            <div class="name">${item.name || '-'}</div>
            <div class="sub">รหัส: ${item.barcode || '-'}</div>
            <div class="sub">ประเภท: ${item.category || '-'}</div>
            <div class="sub">รุ่น: ${item.model || '-'} | ปี: ${item.year || '-'}</div>
            <div class="sub ${low ? 'danger' : ''}">คงเหลือ: ${money(item.quantity)}${Number(item.minStock || 0) > 0 ? ` | เตือนต่ำกว่า ${money(item.minStock)}` : ''}</div>
            <div class="sub">${getPriceLabel(selectedPriceType)}: ${money(price)} บาท</div>
            <button onclick="addToCart(${item.id})">เลือกสินค้า</button>`;
          grid.appendChild(card);
        });
      }
      function addToCart(id) {
        const item = findItem(id);
        if (!item) return alert('ไม่พบสินค้า');
        const sameLine = cart.find((c) => c.id == id && c.priceType === selectedPriceType);
        const usedQty = cart.filter((c) => c.id == id).reduce((sum, c) => sum + Number(c.qty || 0), 0);
        if (usedQty >= Number(item.quantity || 0)) return alert('จำนวนเกินสต๊อก');
        if (sameLine) sameLine.qty += 1;
        else cart.push({ id: item.id, barcode: item.barcode || '', name: item.name || '', qty: 1, priceType: selectedPriceType, priceLabel: getPriceLabel(selectedPriceType), price: getItemPrice(item, selectedPriceType) });
        renderCart();
        focusScan();
      }
      function handleBarcodeEnter(event) {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        const code = event.target.value.trim();
        event.target.value = '';
        if (!code) return;
        const item = items.find((i) => String(i.barcode || '').trim() === code);
        if (!item) return alert('ไม่พบบาร์โค้ดนี้ในสต๊อก');
        addToCart(item.id);
      }
      function increaseQty(index) {
        const row = cart[index];
        if (!row) return;
        const item = findItem(row.id);
        const usedQty = cart.filter((c) => c.id == row.id).reduce((sum, c) => sum + Number(c.qty || 0), 0);
        if (usedQty >= Number(item.quantity || 0)) return alert('จำนวนเกินสต๊อก');
        row.qty += 1;
        renderCart();
      }
      function decreaseQty(index) {
        const row = cart[index];
        if (!row) return;
        row.qty -= 1;
        if (row.qty <= 0) cart.splice(index, 1);
        renderCart();
      }
      function removeCartItem(index) { cart.splice(index, 1); renderCart(); }
      function getCartSubtotal() { return cart.reduce((sum, c) => sum + Number(c.price || 0) * Number(c.qty || 0), 0); }
      function getLaborCost() { return Number($('laborCost').value) || 0; }
      function getCartTotal() { return getCartSubtotal() + getLaborCost(); }
      function renderCart() {
        const cartBody = $('cartBody');
        cartBody.innerHTML = '';
        if (!cart.length) cartBody.innerHTML = '<tr><td colspan="6">ยังไม่มีสินค้าในตะกร้า</td></tr>';
        cart.forEach((item, index) => {
          const total = Number(item.price || 0) * Number(item.qty || 0);
          cartBody.innerHTML += `
            <tr>
              <td>${index + 1}</td>
              <td>${item.barcode || '-'}</td>
              <td>
                <b>${item.name || '-'}</b><br>
                <span class="tag">${item.priceLabel || getPriceLabel(item.priceType)}</span>
                <div class="actions">
                  <button class="minus" onclick="decreaseQty(${index})">-</button>
                  <button class="plus" onclick="increaseQty(${index})">+</button>
                  <button class="remove" onclick="removeCartItem(${index})">ลบ</button>
                </div>
              </td>
              <td>${money(item.qty)}</td>
              <td>${money(item.price)}</td>
              <td>${money(total)}</td>
            </tr>`;
        });
        $('subtotalText').innerText = money(getCartSubtotal()) + ' บาท';
        $('laborText').innerText = money(getLaborCost()) + ' บาท';
        $('totalText').innerText = 'รวม ' + money(getCartTotal()) + ' บาท';
        updateChangePreview();
      }
      function addPaid(amount) { $('paid').value = (Number($('paid').value) || 0) + amount; updateChangePreview(); }
      function setPaidExact() { $('paid').value = getCartTotal() || ''; updateChangePreview(); }
      function roundPaid() {
        const total = getCartTotal();
        if (!total) return;
        let rounded = 20;
        if (total > 20) {
          const pow = Math.pow(10, String(Math.floor(total)).length - 1);
          rounded = Math.ceil(total / pow) * pow;
          if (rounded < total) rounded += pow;
        }
        $('paid').value = rounded;
        updateChangePreview();
      }
      function updateChangePreview() {
        const paid = Number($('paid').value) || 0;
        const change = paid - getCartTotal();
        $('changePreview').innerHTML = paid <= 0 ? 'เงินทอน: 0 บาท' : change < 0 ? `<span class="danger">ขาดอีก: ${money(Math.abs(change))} บาท</span>` : `เงินทอน: ${money(change)} บาท`;
      }
      function focusScan() { setTimeout(() => $('barcodeScan')?.focus(), 50); }
      function openPrint(data) {
        localStorage.setItem('printData', JSON.stringify(data));
        window.open('/print.html?v=' + Date.now() + '&paper=' + encodeURIComponent(getPaperSize()), '_blank');
      }
      async function checkout() {
        try {
          if (!cart.length) return alert('ไม่มีสินค้าในตะกร้า');
          const result = await api('/api/checkout', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
              customerName: $('customerName').value.trim(),
              laborCost: getLaborCost(),
              paid: Number($('paid').value) || 0,
              items: cart.map((c) => ({ id: c.id, qty: c.qty, price: c.price, priceType: c.priceType, priceLabel: c.priceLabel })),
            })
          });
          lastReceipt = result.receipt;
          localStorage.setItem('lastSaleReceipt', JSON.stringify(result.receipt));
          openPrint({ type: 'sale', receipt: result.receipt, paperSize: getPaperSize() });
          clearCart(false);
          await loadItems();
        } catch (err) { alert(err.message); }
      }
      function reprintLastReceipt() {
        const receipt = lastReceipt || JSON.parse(localStorage.getItem('lastSaleReceipt') || 'null');
        if (!receipt) return alert('ยังไม่มีบิลล่าสุดให้พิมพ์ซ้ำ');
        openPrint({ type: 'sale', receipt, paperSize: getPaperSize() });
      }
      function clearCart(resetCustomer = true) {
        cart = [];
        $('laborCost').value = '';
        $('paid').value = '';
        if (resetCustomer) $('customerName').value = '';
        renderCart();
        focusScan();
      }
      async function logout() {
        try { await fetch('/api/logout', { method: 'POST' }); } catch {}
        location.href = '/login.html';
      }
      (async function checkAuth() {
        try { const res = await fetch('/api/auth/me'); if (!res.ok) location.href = '/login.html'; } catch { location.href = '/login.html'; }
      })();
      (async function startup() {
        $('paperSize').value = getPaperSize();
        try { await loadItems(); } catch (err) { $('productGrid').innerHTML = '<div class="muted">' + err.message + '</div>'; }
        renderCart();
        focusScan();
      })();
    </script>
  </body>
</html>

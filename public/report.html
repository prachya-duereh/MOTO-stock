<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>รายงานยอดขาย</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      background: #f3f5f7;
      color: #0f172a;
    }
    .container {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav a {
      text-decoration: none;
      color: #fff;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
    }
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
      background: #fff;
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 18px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
    }
    .field label {
      font-size: 14px;
      color: #475569;
      font-weight: 600;
    }
    .field input {
      height: 48px;
      border: 1px solid #cfd8e3;
      border-radius: 12px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 16px;
      background: #f8fafc;
    }
    .btn {
      height: 48px;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #0f766e; color: #fff; }
    .cards {
      display: grid;
      grid-template-columns: repeat(6, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      padding: 18px;
      min-height: 110px;
    }
    .card .title {
      color: #475569;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .panel {
      background: #fff;
      border: 1px solid #d9e0e7;
      border-radius: 22px;
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    .profit-item, .bill-item, .stock-item {
      border: 1px solid #d9e0e7;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fbfcfd;
    }
    .profit-item:last-child,
    .bill-item:last-child,
    .stock-item:last-child {
      margin-bottom: 0;
    }
    .bill-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .bill-lines {
      font-size: 15px;
      line-height: 1.8;
    }
    .bill-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .bill-actions .action-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
    }
    .print-btn { background: #16a34a; }
    .copy-btn { background: #2563eb; }
    .edit-btn { background: #f59e0b; }
    .delete-btn { background: #dc2626; }
    .empty {
      color: #64748b;
      font-size: 18px;
    }
    .bill-item-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .bill-item-table th,
    .bill-item-table td {
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      padding: 8px 6px;
      font-size: 14px;
    }
    .bill-item-table th {
      color: #475569;
      font-weight: 700;
    }

    @media (max-width: 1200px) {
      .cards { grid-template-columns: repeat(3, minmax(180px, 1fr)); }
      .grid-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .cards { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .container { padding: 12px; }
      .card .value { font-size: 24px; }
    }

    @media (max-width: 520px) {
      .cards { grid-template-columns: 1fr; }
      .filters { flex-direction: column; align-items: stretch; }
      .field { min-width: 100%; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="nav">
        <a href="/admin.html">⚙️ หลังบ้าน</a>
        <a href="/pos.html">🛒 หน้าร้าน</a>
        <a href="/repair-history.html">🛠️ ประวัติซ่อม</a>
      </div>
    </div>

    <div class="filters">
      <div class="field">
        <label for="startDate">วันที่เริ่ม</label>
        <input type="date" id="startDate" />
      </div>
      <div class="field">
        <label for="endDate">วันที่สิ้นสุด</label>
        <input type="date" id="endDate" />
      </div>
      <button class="btn btn-primary" onclick="loadReport()">ดูรายงาน</button>
      <button class="btn btn-secondary" onclick="setToday()">วันนี้</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="title">ยอดขายวันนี้</div>
        <div class="value" id="todaySales">0</div>
      </div>
      <div class="card">
        <div class="title">ยอดขายเดือนนี้</div>
        <div class="value" id="monthSales">0</div>
      </div>
      <div class="card">
        <div class="title">ยอดขายช่วงที่เลือก</div>
        <div class="value" id="rangeSales">0</div>
      </div>
      <div class="card">
        <div class="title">ค่าแรงรวม</div>
        <div class="value" id="laborTotal">0</div>
      </div>
      <div class="card">
        <div class="title">จำนวนบิล</div>
        <div class="value" id="billCount">0</div>
      </div>
      <div class="card">
        <div class="title">กำไรรวม</div>
        <div class="value" id="profitTotal">0</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>กำไรต่อสินค้า</h2>
        <div id="itemProfitList"></div>
      </div>
      <div class="panel">
        <h2>สต๊อกใกล้หมด</h2>
        <div id="lowStockList"></div>
      </div>
    </div>

    <div class="panel">
      <h2>บิลในช่วงที่เลือก</h2>
      <div id="billList"></div>
    </div>
  </div>

  <script>
    function formatNumber(value) {
      return Number(value || 0).toLocaleString('th-TH');
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setToday() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const day = `${yyyy}-${mm}-${dd}`;
      document.getElementById('startDate').value = day;
      document.getElementById('endDate').value = day;
      loadReport();
    }

    async function loadReport() {
      try {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        const params = new URLSearchParams();
        if (startDate) params.set('startDate', startDate);
        if (endDate) params.set('endDate', endDate);

        const res = await fetch(`/api/report?${params.toString()}`);
        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'โหลดรายงานไม่สำเร็จ');
        }

        document.getElementById('todaySales').textContent = formatNumber(data.summary?.todaySales || 0);
        document.getElementById('monthSales').textContent = formatNumber(data.summary?.monthSales || 0);
        document.getElementById('rangeSales').textContent = formatNumber(data.summary?.rangeSales || 0);
        document.getElementById('laborTotal').textContent = formatNumber(data.summary?.laborTotal || 0);
        document.getElementById('billCount').textContent = formatNumber(data.summary?.billCount || 0);
        document.getElementById('profitTotal').textContent = formatNumber(data.summary?.profitTotal || 0);

        renderItemProfits(data.itemProfits || []);
        renderLowStock(data.lowStock || []);
        renderBills(data.bills || []);
      } catch (error) {
        alert(error.message || 'โหลดรายงานไม่สำเร็จ');
      }
    }

    function renderItemProfits(list) {
      const box = document.getElementById('itemProfitList');
      if (!list.length) {
        box.innerHTML = '<div class="empty">ยังไม่มีข้อมูลกำไรสินค้า</div>';
        return;
      }

      box.innerHTML = list.map(item => `
        <div class="profit-item">
          <div style="font-size:20px;font-weight:800;">${escapeHtml(item.name || '-')} [${escapeHtml(item.barcode || '-')} ]</div>
          <div style="font-size:18px;margin-top:6px;">
            จำนวนขาย ${formatNumber(item.qty)} |
            ยอดขาย ${formatNumber(item.sales)} |
            ต้นทุนรวม ${formatNumber(item.cost)} |
            <strong>กำไร ${formatNumber(item.profit)}</strong>
          </div>
        </div>
      `).join('');
    }

    function renderLowStock(list) {
      const box = document.getElementById('lowStockList');
      if (!list.length) {
        box.innerHTML = '<div class="empty">ยังไม่มีสินค้าที่ต่ำกว่าจุดเตือน</div>';
        return;
      }

      box.innerHTML = list.map(item => `
        <div class="stock-item">
          <div style="font-size:20px;font-weight:800;">${escapeHtml(item.name || '-')}</div>
          <div style="font-size:18px;margin-top:6px;">
            รหัสสินค้า: ${escapeHtml(item.barcode || '-')} |
            คงเหลือ ${formatNumber(item.quantity)} |
            จุดเตือน ${formatNumber(item.minStock)}
          </div>
        </div>
      `).join('');
    }


function storeBillForPrint(bill) {
  const receipt = {
    saleId: bill.saleId || '-',
    date: bill.createdAt || '-',
    customerName: bill.customerName || '-',
    items: Array.isArray(bill.items) ? bill.items.map(item => ({
      barcode: item.barcode || item.id || '-',
      name: item.name || '-',
      qty: Number(item.qty || 0),
      price: Number(item.price || 0),
      total: Number(item.total || 0)
    })) : [],
    itemsTotal: Number(bill.itemsTotal || 0),
    laborCost: Number(bill.laborCost || 0),
    total: Number(bill.grandTotal || 0),
    paid: Number(bill.paid || 0),
    change: Number(bill.change || 0)
  };

  try {
    localStorage.setItem('lastReceipt', JSON.stringify(receipt));
    sessionStorage.setItem('lastReceipt', JSON.stringify(receipt));
    localStorage.setItem('printReceipt', JSON.stringify(receipt));
    sessionStorage.setItem('printReceipt', JSON.stringify(receipt));
  } catch (error) {}
}

function printBillByData(encodedBill) {
  const bill = JSON.parse(decodeURIComponent(encodedBill));
  storeBillForPrint(bill);
  window.open('/print.html', '_blank');
}
function formatThaiDate(dateStr, withSeconds = false) {
  if (!dateStr) return '-';

  if (/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr))) {
    return String(dateStr);
  }

  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);

  const parts = new Intl.DateTimeFormat('sv-SE', {
    timeZone: 'Asia/Bangkok',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    ...(withSeconds ? { second: '2-digit' } : {}),
    hour12: false
  }).formatToParts(d);

  const get = (type) => parts.find((p) => p.type === type)?.value || '';
  return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}${withSeconds ? ':' + get('second') : ''}`;
}

    function renderBills(list) {
      const box = document.getElementById('billList');
      if (!list.length) {
        box.innerHTML = '<div class="empty">ไม่พบบิลในช่วงที่เลือก</div>';
        return;
      }

      box.innerHTML = list.map(bill => {
        const encodedBill = encodeURIComponent(JSON.stringify(bill));
        return `
          <div class="bill-item">
            <div class="bill-title">${escapeHtml(bill.saleId || '-')}</div>
            <div class="bill-lines">
              วันที่: ${escapeHtml(bill.createdAt || '-')} | ลูกค้า: ${escapeHtml(bill.customerName || '-')}<br>
              ค่าสินค้า ${formatNumber(bill.itemsTotal)} | ค่าแรง ${formatNumber(bill.laborCost)} | <strong>รวม ${formatNumber(bill.grandTotal)}</strong>
            </div>

            <table class="bill-item-table">
              <thead>
                <tr>
                  <th>รหัสสินค้า</th>
                  <th>รายการ</th>
                  <th>จำนวน</th>
                  <th>ราคา</th>
                  <th>เป็นเงิน</th>
                  <th>ประเภทราคา</th>
                </tr>
              </thead>
              <tbody>
                ${(bill.items || []).map(item => `
                  <tr>
                    <td>${escapeHtml(item.barcode || '-')}</td>
                    <td>${escapeHtml(item.name || '-')}</td>
                    <td>${formatNumber(item.qty)}</td>
                    <td>${formatNumber(item.price)}</td>
                    <td>${formatNumber(item.total)}</td>
                    <td>${escapeHtml(item.priceLabel || '-')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>

            <div class="bill-actions">
              <button class="action-btn print-btn" onclick="printBillByData('${encodedBill}')">พิมพ์บิล</button>
            </div>
          </div>
        `;
      }).join('');
    }

    setToday();
  </script>
</body>
</html>

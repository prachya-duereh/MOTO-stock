<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พิมพ์บิล</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #f4f4f5;
      font-family: "Kanit", sans-serif;
      color: #111827;
    }
    .page {
      max-width: 380px;
      margin: 20px auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
    }
    .center { text-align: center; }
    .title { font-size: 22px; font-weight: 800; }
    .sub { font-size: 14px; color: #6b7280; }
    .line {
      border-top: 1px dashed #cbd5e1;
      margin: 12px 0;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      margin: 4px 0;
    }
    .item {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
    }
    .item-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .total {
      font-size: 20px;
      font-weight: 800;
    }
    .actions {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }
    .btn {
      border: none;
      background: #16a34a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    @media print {
      body { background: #fff; }
      .page {
        margin: 0;
        border: none;
        border-radius: 0;
        max-width: 100%;
      }
      .actions { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="center">
      <div class="title">ใบเสร็จรับเงิน</div>
      <div class="sub">ร้านอะไหล่มอเตอร์ไซค์</div>
    </div>

    <div class="line"></div>

    <div id="receiptBox">กำลังโหลด...</div>

    <div class="actions">
      <button class="btn" onclick="window.print()">พิมพ์บิล</button>
    </div>
  </div>

  <script>
    function formatNumber(value) {
      return Number(value || 0).toLocaleString('th-TH');
    }

    async function loadBillForPrint() {
      const params = new URLSearchParams(location.search);
      const saleId = params.get('saleId');
      const box = document.getElementById('receiptBox');

      if (!saleId) {
        box.innerHTML = '<div>ไม่พบบิลสำหรับพิมพ์</div>';
        return;
      }

      try {
        const res = await fetch(`/api/sales/${encodeURIComponent(saleId)}`);
        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'โหลดบิลไม่สำเร็จ');
        }

        const bill = data.bill || {};
        const items = Array.isArray(bill.items) ? bill.items : [];

        box.innerHTML = `
          <div class="row"><span>เลขที่บิล</span><strong>${bill.saleId || '-'}</strong></div>
          <div class="row"><span>วันที่</span><span>${bill.createdAt || '-'}</span></div>
          <div class="row"><span>ลูกค้า</span><span>${bill.customerName || '-'}</span></div>
          <div class="line"></div>

          ${items.map(item => `
            <div class="item">
              <div class="item-name">${item.name || '-'}</div>
              <div class="row"><span>รหัสสินค้า</span><span>${item.barcode || '-'}</span></div>
              <div class="row"><span>จำนวน x ราคา</span><span>${formatNumber(item.qty)} x ${formatNumber(item.price)}</span></div>
              <div class="row"><span>ประเภทราคา</span><span>${item.priceLabel || '-'}</span></div>
              <div class="row"><strong>รวม</strong><strong>${formatNumber(item.total)}</strong></div>
            </div>
          `).join('')}

          <div class="line"></div>
          <div class="row"><span>ค่าสินค้า</span><strong>${formatNumber(bill.itemsTotal)}</strong></div>
          <div class="row"><span>ค่าแรง</span><strong>${formatNumber(bill.laborCost)}</strong></div>
          <div class="row total"><span>รวมสุทธิ</span><span>${formatNumber(bill.grandTotal)}</span></div>
          <div class="row"><span>รับเงิน</span><strong>${formatNumber(bill.paid)}</strong></div>
          <div class="row"><span>เงินทอน</span><strong>${formatNumber(bill.change)}</strong></div>
        `;
      } catch (error) {
        box.innerHTML = `<div>${error.message || 'โหลดบิลไม่สำเร็จ'}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadBillForPrint);
  </script>
</body>
</html>

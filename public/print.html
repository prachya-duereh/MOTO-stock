<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พิมพ์ใบเสร็จ POS-58</title>
  <style>
    :root{
      --paper-width: 58mm;
      --preview-bg: #eef1f4;
      --preview-card: #ffffff;
      --preview-text: #111;
      --print-width: 50mm;
      --text: #111;
      --line: #444;
      --bg: var(--preview-bg);
      --card: var(--preview-card);
      --green: #1f8f3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Tahoma", "Noto Sans Thai", sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 10px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 320px;
    }

    .receipt {
      width: 100%;
      background: var(--card);
      border-radius: 18px;
      padding: 14px 10px 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      margin: 0 auto;
    }

    .print-area {
      width: var(--print-width);
      margin: 0 auto;
    }

    .center { text-align: center; }
    .right { text-align: right; }

    .logo {
      width: 46px;
      height: auto;
      display: block;
      margin: 0 auto 4px;
      object-fit: contain;
    }

    .shop-name {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
      margin: 0 0 2px;
    }

    .shop-sub,
    .shop-tel {
      font-size: 11px;
      line-height: 1.2;
      margin: 0;
    }

    .dash {
      border: 0;
      border-top: 1px dashed var(--line);
      margin: 6px 0;
    }

    .title {
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      margin: 4px 0 6px;
    }

    .meta {
      font-size: 11px;
      line-height: 1.35;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 4px;
      align-items: start;
    }

    .thead,
    .item-line-1 {
      display: grid;
      grid-template-columns: 12px 1fr 22px 30px 30px;
      gap: 3px;
      align-items: start;
    }

    .thead {
      font-size: 10px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .item {
      font-size: 10px;
      margin-bottom: 2px;
    }

    .item-line-1 {
      margin-top: 2px;
    }

    .item-no,
    .qty,
    .price,
    .total {
      text-align: right;
      white-space: nowrap;
    }

    .item-code {
      font-size: 10px;
      color: #333;
      line-height: 1.15;
      word-break: break-all;
    }

    .item-name {
      font-size: 10px;
      font-weight: 700;
      line-height: 1.18;
      word-break: break-word;
      margin-top: 1px;
      padding-left: 15px;
    }

    .summary {
      font-size: 11px;
      line-height: 1.35;
    }

    .sum-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin: 1px 0;
    }

    .sum-row .big {
      font-size: 16px;
      font-weight: 800;
    }

    .thanks {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
    }

    .theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:180px;min-height:44px;border:0;border-radius:14px;background:#1e293b;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin:14px auto 0;}
    body.dark{--preview-bg:#0f172a;--preview-card:#111c2f;--preview-text:#e5edf8;}
    .print-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 180px;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin: 14px auto 0;
      box-shadow: 0 6px 18px rgba(31,143,58,.25);
    }

    @page {
      size: 58mm auto;
      margin: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        padding: 0;
        min-height: auto;
      }

      .wrap {
        max-width: none;
        width: var(--paper-width);
      }

      .receipt {
        width: var(--paper-width);
        border-radius: 0;
        box-shadow: none;
        padding: 4mm 3.5mm 5mm;
      }

      .print-area {
        width: 50mm;
      }

      .theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:180px;min-height:44px;border:0;border-radius:14px;background:#1e293b;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin:14px auto 0;}
    body.dark{--preview-bg:#0f172a;--preview-card:#111c2f;--preview-text:#e5edf8;}
    .print-btn {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="receipt">
        <div class="print-area" id="receiptRoot"></div>
      </div>
      <div class="center">
        <button class="theme-toggle" id="themeToggle" type="button">🌙 โหมดมืด</button>
      </div>
      <div class="center">
        <button class="print-btn" onclick="window.print()">พิมพ์เอกสาร</button>
      </div>
    </div>
  </div>

  <script>
    function num(v) {
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function fmtMoney(v) {
      const n = num(v);
      return Number.isInteger(n)
        ? n.toLocaleString("th-TH")
        : n.toLocaleString("th-TH", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function esc(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getReceiptData() {
      const params = new URLSearchParams(window.location.search);
      const keys = [
        "printReceiptData",
        "printReceipt",
        "lastReceipt",
        "repairReceipt",
        "printRepairReceipt"
      ];

      if (params.get("data")) {
        try {
          return JSON.parse(decodeURIComponent(params.get("data")));
        } catch (_) {}
      }

      for (const key of keys) {
        try {
          const local = localStorage.getItem(key);
          if (local) return JSON.parse(local);
        } catch (_) {}

        try {
          const session = sessionStorage.getItem(key);
          if (session) return JSON.parse(session);
        } catch (_) {}
      }

      return null;
    }

    function normalizeItems(data) {
      const rawItems = data.items || data.parts || data.products || [];

      return rawItems.map((item, index) => {
        const qty = num(item.qty ?? item.quantity ?? 1);
        const price = num(item.price ?? item.unitPrice ?? item.unit_price ?? 0);
        const total = num(item.total ?? (qty * price));

        return {
          no: index + 1,
          code: item.barcode || item.code || item.sku || item.id || "",
          name: item.name || item.title || item.itemName || "-",
          qty,
          price,
          total
        };
      });
    }

    function normalizeReceipt(data) {
      const items = normalizeItems(data);
      const laborCost = num(data.laborCost ?? data.serviceCharge ?? data.service_cost ?? 0);
      const itemsTotal = num(
        data.itemsTotal ??
        data.subtotal ??
        items.reduce((sum, i) => sum + i.total, 0)
      );
      const grandTotal = num(
        data.grandTotal ??
        data.total ??
        (itemsTotal + laborCost)
      );
      const paid = num(data.paid ?? data.cash ?? data.received ?? 0);
      const change = num(data.change ?? data.changeAmount ?? Math.max(0, paid - grandTotal));
      const receiptId = data.id || data.saleId || data.receiptId || data.code || "-";
      const date = data.created_at || data.createdAt || data.date || data.repairDate || "-";
      const customerName = data.customerName || data.customer || data.name || "-";
      const paymentMethod = data.paymentMethod || data.payment_method || "cash";

      return {
        receiptId,
        date,
        customerName,
        paymentMethod,
        items,
        itemsTotal,
        laborCost,
        grandTotal,
        paid,
        change
      };
    }

    function renderReceipt(data) {
      const logoUrl = data.logo || "/D.jpg";
      const r = normalizeReceipt(data);
      const root = document.getElementById("receiptRoot");

      const itemRows = r.items.map(item => `
        <div class="item">
          <div class="item-line-1">
            <div class="item-no">${item.no}</div>
            <div class="item-code">${esc(item.code ? "[" + item.code + "]" : "-")}</div>
            <div class="qty">${fmtMoney(item.qty)}</div>
            <div class="price">${fmtMoney(item.price)}</div>
            <div class="total">${fmtMoney(item.total)}</div>
          </div>
          <div class="item-name">${esc(item.name)}</div>
        </div>
      `).join("");

      root.innerHTML = `
        <div class="center">
          <img class="logo" src="${logoUrl}" alt="logo" onerror="this.style.display='none'">
          <div class="shop-name">ดี อะไหล่ กรงปินัง</div>
          <div class="shop-sub">จำหน่ายอะไหล่มอเตอร์ไซค์</div>
          <div class="shop-tel">Tel: 081-766-7549</div>
        </div>

        <hr class="dash">

        <div class="title">ใบเสร็จรับเงิน</div>

        <div class="meta">
          <div class="meta-row"><div><strong>เลขที่:</strong></div><div>${esc(r.receiptId)}</div></div>
          <div class="meta-row"><div><strong>วันที่:</strong></div><div>${esc(r.date)}</div></div>
          <div class="meta-row"><div><strong>ลูกค้า:</strong></div><div>${esc(r.customerName || "-")}</div></div>
          <div class="meta-row"><div><strong>ชำระ:</strong></div><div>${esc(r.paymentMethod === "transfer" ? "เงินโอน" : "เงินสด")}</div></div>
        </div>

        <hr class="dash">

        <div class="thead">
          <div>#</div>
          <div>รายการ</div>
          <div class="right">จำนวน</div>
          <div class="right">ราคา</div>
          <div class="right">รวม</div>
        </div>

        ${itemRows || `<div class="item"><div class="item-name">ไม่มีรายการ</div></div>`}

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>รวม ${fmtMoney(r.items.length)} รายการ</strong></div>
            <div><strong>${fmtMoney(r.itemsTotal)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ค่าบริการ</strong></div>
            <div><strong>${fmtMoney(r.laborCost)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ยอดรวม</strong></div>
            <div><strong class="big">${fmtMoney(r.grandTotal)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>${r.paymentMethod === "transfer" ? "ยอดโอน" : "รับเงิน"}</strong></div>
            <div><strong>${fmtMoney(r.paid)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>เงินทอน</strong></div>
            <div><strong>${fmtMoney(r.change)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="thanks">ขอบคุณที่ใช้บริการ</div>
      `;
    }


    const THEME_KEY = 'motoTheme';
    let currentTheme = localStorage.getItem(THEME_KEY) || 'light';

    function updateThemeToggleText() {
      const toggle = document.getElementById('themeToggle');
      if (!toggle) return;
      toggle.textContent = currentTheme === 'dark' ? '☀️ โหมดสว่าง' : '🌙 โหมดมืด';
    }

    function applyTheme(theme) {
      currentTheme = theme === 'dark' ? 'dark' : 'light';
      document.body.classList.toggle('dark', currentTheme === 'dark');
      localStorage.setItem(THEME_KEY, currentTheme);
      updateThemeToggleText();
    }

    function toggleTheme() {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    applyTheme(currentTheme);
    document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);

    const data = getReceiptData();
    renderReceipt(data || {
      id: "-",
      date: "-",
      customerName: "-",
      items: [],
      laborCost: 0,
      total: 0,
      paid: 0,
      change: 0
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get("autoprint") === "1") {
      window.addEventListener("load", () => {
        setTimeout(() => window.print(), 300);
      });
    }
  </script>
</body>
</html>

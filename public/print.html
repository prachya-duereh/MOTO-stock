<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พิมพ์ใบเสร็จ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      background: #ececec;
      color: #111827;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 12px;
    }

    .receipt {
      width: 100%;
      max-width: 390px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
      padding: 16px;
    }

    .header {
      text-align: center;
      border-bottom: 1px dashed #cbd5e1;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 14px;
      color: #64748b;
    }

    .meta {
      border-bottom: 1px dashed #cbd5e1;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .meta-row,
    .sum-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin: 4px 0;
      font-size: 15px;
    }

    .meta-label,
    .sum-label {
      color: #334155;
      font-weight: 500;
      flex: 0 0 95px;
    }

    .meta-value,
    .sum-value {
      flex: 1;
      text-align: right;
      font-weight: 700;
      word-break: break-word;
    }

    .item {
      padding: 10px 0;
      border-bottom: 1px dashed #e5e7eb;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0;
      font-size: 15px;
    }

    .item-label {
      color: #334155;
      font-weight: 500;
    }

    .item-value {
      text-align: right;
      font-weight: 700;
      word-break: break-word;
    }

    .item-total {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 16px;
      font-weight: 800;
      color: #0f172a;
    }

    .summary {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #cbd5e1;
    }

    .grand-row .sum-value {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #cbd5e1;
      color: #64748b;
      font-size: 13px;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .print-btn {
      border: none;
      background: #16a34a;
      color: #fff;
      border-radius: 12px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .message {
      text-align: center;
      padding: 24px 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .error {
      color: #b91c1c;
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        padding: 0;
      }

      .receipt {
        width: 80mm;
        max-width: 80mm;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 6mm;
      }

      .actions {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="receipt">
      <div id="receiptBox" class="message">กำลังโหลดใบเสร็จ...</div>
      <div class="actions">
        <button class="print-btn" onclick="window.print()">พิมพ์บิล</button>
      </div>
    </div>
  </div>

  <script>
    function formatNumber(value) {
      return Number(value || 0).toLocaleString('th-TH');
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getStoredReceipt() {
      const keys = ['lastReceipt', 'printReceipt'];
      for (const key of keys) {
        try {
          const a = localStorage.getItem(key);
          if (a) return JSON.parse(a);
        } catch (_) {}
        try {
          const b = sessionStorage.getItem(key);
          if (b) return JSON.parse(b);
        } catch (_) {}
      }
      return null;
    }

    function normalizeReceipt(receipt) {
      const items = Array.isArray(receipt.items) ? receipt.items : [];
      const itemsTotal = receipt.itemsTotal != null
        ? Number(receipt.itemsTotal || 0)
        : items.reduce((sum, item) => sum + Number(item.total || 0), 0);

      return {
        saleId: receipt.saleId || receipt.id || receipt.code || '-',
        date: receipt.date || receipt.createdAt || receipt.repairDate || '-',
        customerName: receipt.customerName || '-',
        items: items.map(item => ({
          barcode: item.barcode || item.id || '-',
          name: item.name || '-',
          qty: Number(item.qty || 0),
          price: Number(item.price || item.unitPrice || 0),
          total: Number(item.total || 0),
          priceLabel: item.priceLabel || receipt.priceLabel || receipt.repairPriceLabel || '-'
        })),
        itemsTotal,
        laborCost: Number(receipt.laborCost || 0),
        total: Number(receipt.total || receipt.totalCost || receipt.grandTotal || 0),
        paid: Number(receipt.paid || 0),
        change: Number(receipt.change || 0)
      };
    }

    function renderReceipt(receipt) {
      const box = document.getElementById('receiptBox');
      const items = Array.isArray(receipt.items) ? receipt.items : [];

      box.className = '';
      box.innerHTML = `
        <div class="header">
          <h1 class="title">ใบเสร็จรับเงิน</h1>
          <div class="subtitle">ร้านอะไหล่มอเตอร์ไซค์</div>
        </div>

        <div class="meta">
          <div class="meta-row">
            <div class="meta-label">เลขที่บิล</div>
            <div class="meta-value">${escapeHtml(receipt.saleId || '-')}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">วันที่</div>
            <div class="meta-value">${escapeHtml(receipt.date || '-')}</div>
          </div>
          <div class="meta-row">
            <div class="meta-label">ลูกค้า</div>
            <div class="meta-value">${escapeHtml(receipt.customerName || '-')}</div>
          </div>
        </div>

        <div class="items">
          ${items.length ? items.map(item => `
            <div class="item">
              <div class="item-name">${escapeHtml(item.name || '-')}</div>
              <div class="item-row">
                <div class="item-label">รหัสสินค้า</div>
                <div class="item-value">${escapeHtml(item.barcode || '-')}</div>
              </div>
              <div class="item-row">
                <div class="item-label">จำนวน x ราคา</div>
                <div class="item-value">${formatNumber(item.qty)} x ${formatNumber(item.price)}</div>
              </div>
              <div class="item-row">
                <div class="item-label">ประเภทราคา</div>
                <div class="item-value">${escapeHtml(item.priceLabel || '-')}</div>
              </div>
              <div class="item-total">
                <div>รวม</div>
                <div>${formatNumber(item.total)}</div>
              </div>
            </div>
          `).join('') : `
            <div class="message">ไม่มีรายการสินค้า</div>
          `}
        </div>

        <div class="summary">
          <div class="sum-row">
            <div class="sum-label">ค่าสินค้า</div>
            <div class="sum-value">${formatNumber(receipt.itemsTotal)}</div>
          </div>
          <div class="sum-row">
            <div class="sum-label">ค่าแรง</div>
            <div class="sum-value">${formatNumber(receipt.laborCost)}</div>
          </div>
          <div class="sum-row grand-row">
            <div class="sum-label">รวมสุทธิ</div>
            <div class="sum-value">${formatNumber(receipt.total)}</div>
          </div>
          <div class="sum-row">
            <div class="sum-label">รับเงิน</div>
            <div class="sum-value">${formatNumber(receipt.paid)}</div>
          </div>
          <div class="sum-row">
            <div class="sum-label">เงินทอน</div>
            <div class="sum-value">${formatNumber(receipt.change)}</div>
          </div>
        </div>

        <div class="footer">ขอบคุณที่ใช้บริการ</div>
      `;
    }

    function loadReceipt() {
      const box = document.getElementById('receiptBox');
      const stored = getStoredReceipt();

      if (!stored) {
        box.className = 'message error';
        box.textContent = 'ไม่พบบิลสำหรับพิมพ์';
        return;
      }

      renderReceipt(normalizeReceipt(stored));
    }

    document.addEventListener('DOMContentLoaded', loadReceipt);
  </script>
</body>
</html>

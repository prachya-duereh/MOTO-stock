<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ใบเสร็จรับเงิน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f0f0f0;
      font-family: "Tahoma", "Noto Sans Thai", sans-serif;
      color: #111;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }

    .paper {
      width: 80mm;
      min-height: 100vh;
      background: #fff;
      padding: 8px 10px 16px;
    }

    .center { text-align: center; }

    .logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: inline-block;
      margin-bottom: 2px;
    }

    .shop-name {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      margin: 2px 0 0;
    }

    .shop-sub {
      font-size: 14px;
      line-height: 1.2;
      margin: 2px 0 0;
    }

    .shop-tel {
      font-size: 14px;
      line-height: 1.2;
      margin: 2px 0 4px;
    }

    .dash {
      border-top: 2px dashed #666;
      margin: 6px 0;
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin: 4px 0 6px;
      line-height: 1.1;
    }

    .meta {
      font-size: 14px;
      line-height: 1.35;
      margin: 1px 0;
      white-space: nowrap;
    }

    .meta b {
      display: inline-block;
      min-width: 48px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
      line-height: 1.25;
    }

    thead th {
      font-weight: 800;
      text-align: center;
      padding: 2px 1px;
    }

    tbody td {
      padding: 2px 1px;
      vertical-align: top;
    }

    .c-no { width: 18px; text-align: center; }
    .c-name { width: auto; }
    .c-qty { width: 28px; text-align: center; }
    .c-price { width: 42px; text-align: right; }
    .c-total { width: 42px; text-align: right; }

    .code {
      color: #555;
      word-break: break-word;
    }

    .name {
      font-weight: 700;
      word-break: break-word;
    }

    .summary {
      font-size: 14px;
      line-height: 1.35;
      margin-top: 4px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 1px 0;
      white-space: nowrap;
    }

    .row .label {
      font-weight: 700;
    }

    .row .value {
      text-align: right;
      min-width: 70px;
    }

    .grand {
      font-size: 16px;
      font-weight: 800;
    }

    .footer {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .print-btn {
      border: none;
      background: #16a34a;
      color: #fff;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .message {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      padding: 24px 8px;
    }

    .error {
      color: #b91c1c;
    }

    .document-paper {
      width: 210mm;
      max-width: calc(100vw - 24px);
      min-height: auto;
      padding: 18px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(15,23,42,.10);
      font-family: "Prompt", sans-serif;
      color: #0f172a;
    }
    .repair-doc {
      border: 1px solid #cbd5e1;
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
    }
    .repair-doc-header {
      padding: 24px 28px 18px;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
      color: #fff;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      flex-wrap:wrap;
    }
    .repair-brand { display:flex; gap:14px; align-items:center; }
    .repair-brand .doc-logo { width:64px; height:64px; object-fit:contain; background:rgba(255,255,255,.12); border-radius:16px; padding:8px; }
    .repair-brand-title { font-size: 30px; font-weight: 800; line-height:1.1; }
    .repair-brand-sub { font-size: 14px; opacity:.9; margin-top:4px; }
    .repair-doc-code { text-align:right; }
    .repair-doc-code .caption { font-size: 12px; opacity:.8; }
    .repair-doc-code .number { font-size: 24px; font-weight: 800; margin-top:3px; }
    .repair-doc-code .date { margin-top:6px; font-size: 14px; }
    .repair-doc-body { padding: 24px 28px 28px; }
    .repair-title-row { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .repair-title { font-size: 28px; font-weight: 800; }
    .repair-pill { padding:8px 14px; border-radius:999px; background:#dbeafe; color:#1d4ed8; font-weight:700; font-size:14px; }
    .repair-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-bottom:16px; }
    .repair-card { border:1px solid #e2e8f0; border-radius:18px; padding:16px; background:#f8fafc; }
    .repair-card h3 { margin:0 0 10px; font-size:16px; }
    .repair-fields { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .repair-field .label { font-size:12px; color:#64748b; font-weight:600; margin-bottom:4px; }
    .repair-field .value { font-size:15px; font-weight:600; min-height:24px; word-break:break-word; }
    .repair-note { border:1px solid #e2e8f0; border-radius:18px; padding:16px; background:#fff; margin-bottom:16px; }
    .repair-note-title { font-size:15px; font-weight:700; margin-bottom:8px; }
    .repair-table-wrap { border:1px solid #e2e8f0; border-radius:18px; overflow:hidden; margin-bottom:16px; }
    .repair-table { width:100%; border-collapse:collapse; table-layout:auto; font-family:"Prompt", sans-serif; }
    .repair-table th { background:#eff6ff; color:#1e3a8a; font-size:13px; text-align:left; padding:12px 14px; }
    .repair-table td { padding:12px 14px; border-top:1px solid #e2e8f0; font-size:14px; vertical-align:top; }
    .repair-table .num, .repair-table .money { text-align:right; white-space:nowrap; }
    .repair-summary { display:grid; grid-template-columns:1.1fr .9fr; gap:16px; align-items:stretch; }
    .repair-box { border:1px solid #e2e8f0; border-radius:18px; padding:16px; background:#fff; }
    .repair-box h4 { margin:0 0 10px; font-size:15px; }
    .repair-total-row { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px dashed #cbd5e1; }
    .repair-total-row:last-child { border-bottom:none; }
    .repair-total-row.grand { font-size:20px; font-weight:800; color:#0f172a; }
    .signature-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; margin-top:22px; }
    .signature-box { border:1px solid #cbd5e1; border-radius:16px; padding:18px 16px 12px; min-height:110px; display:flex; flex-direction:column; justify-content:flex-end; }
    .signature-line { border-top:1px solid #94a3b8; padding-top:8px; text-align:center; color:#475569; font-size:14px; }

    @media print {
      body { background: #fff; }
      .page { padding: 0; }
      .paper {
        width: 80mm;
        min-height: auto;
        padding: 6px 8px 10px;
      }
      .document-paper {
        width: 100%;
        max-width: none;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }
      .repair-doc { border: none; border-radius: 0; }
      .repair-doc-header { padding: 18px 22px 14px; }
      .repair-doc-body { padding: 18px 22px 20px; }
      .actions { display: none; }
    }
    @media (max-width: 900px) {
      .document-paper { width: 100%; border-radius: 14px; padding: 12px; }
      .repair-grid, .repair-fields, .repair-summary, .signature-grid { grid-template-columns: 1fr; }
      .repair-doc-header, .repair-title-row { align-items: flex-start; }
      .repair-brand-title { font-size: 24px; }
      .repair-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="paper">
      <div id="printArea" class="message">กำลังโหลดใบเสร็จ...</div>
      <div class="actions">
        <button class="print-btn" onclick="manualPrint()">พิมพ์บิล</button>
      </div>
    </div>
  </div>

  <script>

    let hasTriggeredAutoPrint = false;

    function manualPrint() {
      window.print();
    }

    function tryAutoPrint() {
      const params = new URLSearchParams(window.location.search);
      const shouldAutoPrint = params.get('autoprint') === '1';
      if (!shouldAutoPrint || hasTriggeredAutoPrint) return;
      hasTriggeredAutoPrint = true;
      setTimeout(() => {
        window.print();
      }, 250);
    }

    function money(n) {
      return Number(n || 0).toLocaleString('th-TH', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatThaiDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return String(dateStr);

      const parts = new Intl.DateTimeFormat('sv-SE', {
        timeZone: 'Asia/Bangkok',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(d);

      const get = (type) => parts.find(p => p.type === type)?.value || '';
      return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}`;
    }

    function formatThaiDateOnly(dateStr) {
      if (!dateStr) return '-';
      if (/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr))) return String(dateStr);
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return String(dateStr);

      const parts = new Intl.DateTimeFormat('sv-SE', {
        timeZone: 'Asia/Bangkok',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(d);

      const get = (type) => parts.find(p => p.type === type)?.value || '';
      return `${get('year')}-${get('month')}-${get('day')}`;
    }

    function getStoredReceipt() {
      const keys = ['lastReceipt', 'printReceipt', 'printData', 'lastRepairPrint'];
      for (const key of keys) {
        try {
          const a = localStorage.getItem(key);
          if (a) return JSON.parse(a);
        } catch (_) {}
        try {
          const b = sessionStorage.getItem(key);
          if (b) return JSON.parse(b);
        } catch (_) {}
      }
      return null;
    }

    function normalizeData(data) {
      if (!data) return null;

      if (data.type === 'repair_receipt' && data.repair) {
        const repair = data.repair;
        const extraLabor = Number(data.extraLabor || 0);
        const laborCost = Number(repair.laborCost || 0) + extraLabor;
        const items = Array.isArray(repair.parts) ? repair.parts.map(p => ({
          barcode: p.barcode || p.id || '-',
          name: p.name || '-',
          qty: Number(p.qty || 0),
          price: Number(p.unitPrice || 0),
          total: Number(p.total || 0)
        })) : [];

        const itemsTotal = Number(repair.partsCost || 0);
        return {
          saleId: repair.id || '-',
          date: repair.repairDate || repair.created_at || '-',
          customerName: repair.customerName || '-',
          items,
          itemsTotal,
          laborCost,
          total: itemsTotal + laborCost,
          paid: itemsTotal + laborCost,
          change: 0,
          dateOnly: !!repair.repairDate && /^\d{4}-\d{2}-\d{2}$/.test(String(repair.repairDate))
        };
      }

      if (data.type === 'repair_form' && data.repair) {
        const repair = data.repair;
        const items = Array.isArray(repair.parts) ? repair.parts.map(p => ({
          barcode: p.barcode || p.id || '-',
          name: p.name || '-',
          qty: Number(p.qty || 0),
          price: Number(p.unitPrice || 0),
          total: Number(p.total || 0)
        })) : [];

        const itemsTotal = Number(repair.partsCost || 0);
        const laborCost = Number(repair.laborCost || 0);

        return {
          type: 'repair_form',
          saleId: repair.id || '-',
          date: repair.repairDate || repair.created_at || '-',
          customerName: repair.customerName || '-',
          phone: repair.phone || '-',
          bikeModel: repair.bikeModel || '-',
          plate: repair.plate || '-',
          symptom: repair.symptom || '-',
          note: repair.note || '-',
          repairPriceLabel: repair.repairPriceLabel || '-',
          items,
          itemsTotal,
          laborCost,
          total: itemsTotal + laborCost,
          paid: itemsTotal + laborCost,
          change: 0,
          dateOnly: !!repair.repairDate && /^\d{4}-\d{2}-\d{2}$/.test(String(repair.repairDate))
        };
      }

      const items = Array.isArray(data.items) ? data.items.map(item => ({
        barcode: item.barcode || item.id || '-',
        name: item.name || '-',
        qty: Number(item.qty || 0),
        price: Number(item.price || item.unitPrice || 0),
        total: Number(item.total || 0)
      })) : [];

      const itemsTotal = data.itemsTotal != null
        ? Number(data.itemsTotal || 0)
        : items.reduce((sum, item) => sum + Number(item.total || 0), 0);

      return {
        saleId: data.saleId || data.id || data.code || '-',
        date: data.date || data.createdAt || data.repairDate || '-',
        customerName: data.customerName || '-',
        items,
        itemsTotal,
        laborCost: Number(data.laborCost || 0),
        total: Number(data.total || data.totalCost || data.grandTotal || 0),
        paid: Number(data.paid || 0),
        change: Number(data.change || 0),
        dateOnly: !!data.repairDate && /^\d{4}-\d{2}-\d{2}$/.test(String(data.repairDate))
      };
    }

    function renderRepairForm(repair) {
      const el = document.getElementById('printArea');
      const items = Array.isArray(repair.items) ? repair.items : [];
      const showDate = repair.dateOnly ? formatThaiDateOnly(repair.date) : formatThaiDate(repair.date);
      const symptom = repair.symptom || '-';
      const note = repair.note || '-';
      el.className = '';
      el.parentElement.className = 'document-paper';
      el.innerHTML = `
        <div class="repair-doc">
          <div class="repair-doc-header">
            <div class="repair-brand">
              <img src="/D.jpg" alt="logo" class="doc-logo" onerror="this.style.display='none'">
              <div>
                <div class="repair-brand-title">ดี อะไหล่ กรุงปินัง</div>
                <div class="repair-brand-sub">เอกสารรับงานซ่อม / Repair Service Intake Form</div>
              </div>
            </div>
            <div class="repair-doc-code">
              <div class="caption">เลขที่เอกสาร</div>
              <div class="number">#${escapeHtml(repair.saleId || '-')}</div>
              <div class="date">วันที่ ${escapeHtml(showDate)}</div>
            </div>
          </div>
          <div class="repair-doc-body">
            <div class="repair-title-row">
              <div class="repair-title">ใบรับซ่อม</div>
              <div class="repair-pill">${escapeHtml(repair.repairPriceLabel || '-')}</div>
            </div>
            <div class="repair-grid">
              <div class="repair-card">
                <h3>ข้อมูลลูกค้า</h3>
                <div class="repair-fields">
                  <div class="repair-field"><div class="label">ชื่อลูกค้า</div><div class="value">${escapeHtml(repair.customerName || '-')}</div></div>
                  <div class="repair-field"><div class="label">เบอร์โทร</div><div class="value">${escapeHtml(repair.phone || '-')}</div></div>
                </div>
              </div>
              <div class="repair-card">
                <h3>ข้อมูลรถ</h3>
                <div class="repair-fields">
                  <div class="repair-field"><div class="label">รุ่นรถ</div><div class="value">${escapeHtml(repair.bikeModel || '-')}</div></div>
                  <div class="repair-field"><div class="label">ทะเบียนรถ</div><div class="value">${escapeHtml(repair.plate || '-')}</div></div>
                </div>
              </div>
            </div>
            <div class="repair-note">
              <div class="repair-note-title">อาการ / รายละเอียดงานซ่อม</div>
              <div>${escapeHtml(symptom).replace(/
/g,'<br>')}</div>
            </div>
            <div class="repair-table-wrap">
              <table class="repair-table">
                <thead>
                  <tr>
                    <th style="width:60px">ลำดับ</th>
                    <th>รายการอะไหล่</th>
                    <th style="width:110px">รหัสสินค้า</th>
                    <th style="width:90px" class="num">จำนวน</th>
                    <th style="width:120px" class="money">ราคาต่อหน่วย</th>
                    <th style="width:120px" class="money">รวมเงิน</th>
                  </tr>
                </thead>
                <tbody>
                  ${items.length ? items.map((item, index) => `
                    <tr>
                      <td>${index + 1}</td>
                      <td>${escapeHtml(item.name || '-')}</td>
                      <td>${escapeHtml(item.barcode || '-')}</td>
                      <td class="num">${money(item.qty)}</td>
                      <td class="money">${money(item.price)}</td>
                      <td class="money">${money(item.total)}</td>
                    </tr>`).join('') : `<tr><td colspan="6" style="text-align:center;color:#64748b">ยังไม่ได้ระบุรายการอะไหล่</td></tr>`}
                </tbody>
              </table>
            </div>
            <div class="repair-summary">
              <div class="repair-box">
                <h4>หมายเหตุเพิ่มเติม</h4>
                <div>${escapeHtml(note).replace(/
/g,'<br>')}</div>
              </div>
              <div class="repair-box">
                <h4>สรุปราคา</h4>
                <div class="repair-total-row"><span>ค่าอะไหล่</span><strong>${money(repair.itemsTotal)}</strong></div>
                <div class="repair-total-row"><span>ค่าแรง</span><strong>${money(repair.laborCost)}</strong></div>
                <div class="repair-total-row grand"><span>รวมทั้งสิ้น</span><span>${money(repair.total)}</span></div>
              </div>
            </div>
            <div class="signature-grid">
              <div class="signature-box"><div class="signature-line">ลายเซ็นผู้รับซ่อม</div></div>
              <div class="signature-box"><div class="signature-line">ลายเซ็นลูกค้า</div></div>
            </div>
          </div>
        </div>`;
    }

    function renderReceipt(receipt) {
      const el = document.getElementById('printArea');
      const items = Array.isArray(receipt.items) ? receipt.items : [];
      const itemCount = items.reduce((sum, item) => sum + Number(item.qty || 0), 0);
      const showDate = receipt.dateOnly ? formatThaiDateOnly(receipt.date) : formatThaiDate(receipt.date);

      el.className = '';
      el.innerHTML = `
        <div class="center">
          <img src="/D.jpg" alt="logo" class="logo" onerror="this.style.display='none'">
          <div class="shop-name">ดี อะไหล่ กรงปินัง</div>
          <div class="shop-sub">จำหน่ายอะไหล่มอเตอร์ไซค์</div>
          <div class="shop-tel">Tel: 081-766-7549</div>
        </div>

        <div class="dash"></div>
        <div class="title">ใบเสร็จรับเงิน</div>

        <div class="meta"><b>เลขที่:</b> ${escapeHtml(receipt.saleId || '-')}</div>
        <div class="meta"><b>วันที่:</b> ${escapeHtml(showDate)}</div>
        <div class="meta"><b>ลูกค้า:</b> ${escapeHtml(receipt.customerName || '-')}</div>

        <div class="dash"></div>

        <table>
          <thead>
            <tr>
              <th class="c-no">#</th>
              <th class="c-name">รายการ</th>
              <th class="c-qty">จำนวน</th>
              <th class="c-price">ราคา</th>
              <th class="c-total">รวม</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((item, index) => `
              <tr>
                <td class="c-no">${index + 1}</td>
                <td class="c-name">
                  <div class="code">[${escapeHtml(item.barcode || '-')} ]</div>
                  <div class="name">${escapeHtml(item.name || '-')}</div>
                </td>
                <td class="c-qty">${money(item.qty)}</td>
                <td class="c-price">${money(item.price)}</td>
                <td class="c-total">${money(item.total)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div class="dash"></div>

        <div class="summary">
          <div class="row">
            <div class="label">รวม ${money(itemCount)} รายการ</div>
            <div class="value">${money(receipt.itemsTotal)}</div>
          </div>
          <div class="row">
            <div class="label">ค่าบริการ</div>
            <div class="value">${money(receipt.laborCost)}</div>
          </div>
          <div class="row grand">
            <div class="label">ยอดรวม</div>
            <div class="value">${money(receipt.total)}</div>
          </div>
        </div>

        <div class="dash"></div>

        <div class="summary">
          <div class="row">
            <div class="label">รับเงิน</div>
            <div class="value">${money(receipt.paid)}</div>
          </div>
          <div class="row">
            <div class="label">เงินทอน</div>
            <div class="value">${money(receipt.change)}</div>
          </div>
        </div>

        <div class="dash"></div>
        <div class="footer">ขอบคุณที่ใช้บริการ</div>
      `;
    }

    function startup() {
      const stored = getStoredReceipt();
      const normalized = normalizeData(stored);

      if (!normalized) {
        const el = document.getElementById('printArea');
        el.className = 'message error';
        el.textContent = 'ไม่พบบิลสำหรับพิมพ์';
        return;
      }

      const printArea = document.getElementById('printArea');
      printArea.parentElement.className = '';
      if (normalized.type === 'repair_form') {
        renderRepairForm(normalized);
      } else {
        renderReceipt(normalized);
      }
      tryAutoPrint();
    }

    document.addEventListener('DOMContentLoaded', startup);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พิมพ์ใบเสร็จ POS-58</title>
  <style>
    :root{
      --paper-width: 58mm;
      --print-width: 52mm;
      --text: #111;
      --line: #444;
      --bg: #eef1f4;
      --card: #ffffff;
      --green: #1f8f3a;
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Tahoma, Arial, sans-serif;
      font-weight: 400;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: auto;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 10px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 320px;
    }

    .receipt-shell {
      width: 100%;
      background: var(--card);
      border-radius: 18px;
      padding: 14px 10px 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
      margin: 0 auto;
    }

    .print-area {
      width: var(--print-width);
      margin: 0 auto;
    }

    .center { text-align: center; }
    .right { text-align: right; }

    .logo {
      width: 46px;
      height: auto;
      display: block;
      margin: 0 auto 4px;
      object-fit: contain;
    }

    .shop-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 2px;
    }

    .shop-sub,
    .shop-tel {
      font-size: 12px;
      line-height: 1.25;
      margin: 0;
      font-weight: 400;
    }

    .dash {
      border: 0;
      border-top: 1px dashed var(--line);
      margin: 6px 0;
    }

    .title {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      margin: 4px 0 6px;
      line-height: 1.2;
    }

    .meta {
      font-size: 12px;
      line-height: 1.38;
      font-weight: 400;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 4px;
      align-items: start;
    }

    .meta-row .label {
      font-weight: 700;
    }

    .thead,
    .item-line-1 {
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) 24px 34px 36px;
      column-gap: 2px;
      align-items: start;
    }

    .thead {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .thead > div:nth-child(2) {
      padding-left: 2px;
    }

    .item {
      font-size: 12px;
      margin-bottom: 4px;
    }

    .item-line-1 {
      margin-top: 1px;
      line-height: 1.2;
    }

    .item-no,
    .qty,
    .price,
    .total {
      text-align: right;
      white-space: nowrap;
      font-weight: 400;
    }

    .item-no {
      padding-top: 0;
    }

    .item-code {
      font-size: 11px;
      line-height: 1.22;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: normal;
      font-weight: 400;
      color: #111;
      padding-left: 2px;
      min-width: 0;
    }

    .item-name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.22;
      word-break: break-word;
      overflow-wrap: anywhere;
      margin-top: 1px;
      padding-left: 16px;
    }

    .summary {
      font-size: 12px;
      line-height: 1.4;
    }

    .sum-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin: 1px 0;
    }

    .sum-row strong {
      font-weight: 700;
    }

    .sum-row .big {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
    }

    .thanks {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      margin-top: 4px;
      line-height: 1.2;
    }

    .print-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 180px;
      min-height: 46px;
      border: 0;
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin: 14px auto 0;
      box-shadow: 0 6px 18px rgba(31, 143, 58, .25);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .print-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(31, 143, 58, .32);
      filter: brightness(1.02);
    }

    .print-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(31, 143, 58, .22);
    }

    @page {
      size: 58mm auto;
      margin: 0;
    }

    @media print {
      html, body {
        width: 58mm !important;
        background: #fff !important;
        color: #000 !important;
        font-family: Tahoma, Arial, sans-serif !important;
        font-size: 12px !important;
        font-weight: 400 !important;
      }

      * {
        transform: none !important;
        zoom: 1 !important;
        text-shadow: none !important;
        box-shadow: none !important;
        filter: none !important;
      }

      body {
        -webkit-font-smoothing: none !important;
        image-rendering: pixelated;
      }

      .page {
        padding: 0;
        min-height: auto;
        display: block;
      }

      .wrap {
        max-width: none;
        width: 58mm;
      }

      .receipt-shell {
        width: 58mm;
        border-radius: 0;
        box-shadow: none;
        padding: 2.5mm 3mm 4mm;
        background: #fff !important;
      }

      .print-area {
        width: 52mm;
        margin: 0 auto;
      }

      .logo {
        width: 44px;
        margin-bottom: 3px;
      }

      .shop-name {
        font-size: 15px;
        line-height: 1.15;
      }

      .shop-sub,
      .shop-tel,
      .meta,
      .thead,
      .item,
      .summary,
      .thanks {
        color: #000 !important;
      }

      .dash {
        border-top: 1px dashed #000;
      }

      .thead,
      .item-line-1 {
        grid-template-columns: 14px minmax(0, 1fr) 24px 34px 36px;
        column-gap: 2px;
      }

      .item {
        margin-bottom: 5px;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .item-code {
        font-size: 11px;
        line-height: 1.23;
      }

      .item-name {
        font-size: 12px;
        line-height: 1.2;
        margin-top: 1px;
      }

      .sum-row .big {
        font-size: 16px;
      }

      .print-btn,
      button {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="receipt-shell">
        <div class="print-area" id="receiptRoot"></div>
      </div>

      <div class="center">
        <button class="print-btn" type="button" onclick="window.print()">พิมพ์เอกสาร</button>
      </div>
    </div>
  </div>

  <script>
    function num(v) {
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function fmtMoney(v) {
      const n = num(v);
      return Number.isInteger(n)
        ? n.toLocaleString("th-TH")
        : n.toLocaleString("th-TH", {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
          });
    }

    function esc(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDateForReceipt(value) {
      if (!value) return "-";

      const raw = String(value).trim();

      if (/^\d{2}\/\d{2}\/\d{4}\s\d{2}:\d{2}$/.test(raw)) {
        return raw;
      }

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) {
        return raw;
      }

      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        const [y, m, d] = raw.split("-");
        return `${d}/${m}/${y}`;
      }

      const parsed = new Date(raw);
      if (!Number.isNaN(parsed.getTime())) {
        const day = String(parsed.getDate()).padStart(2, "0");
        const month = String(parsed.getMonth() + 1).padStart(2, "0");
        const year = parsed.getFullYear();
        const hours = String(parsed.getHours()).padStart(2, "0");
        const mins = String(parsed.getMinutes()).padStart(2, "0");
        return `${day}/${month}/${year} ${hours}:${mins}`;
      }

      return raw;
    }

    function paymentMethodLabel(method) {
      const value = String(method || "").toLowerCase().trim();
      if (
        value === "transfer" ||
        value === "bank" ||
        value === "qr" ||
        value === "promptpay" ||
        value.includes("โอน")
      ) {
        return "เงินโอน";
      }
      return "เงินสด";
    }

    function getReceiptData() {
      const params = new URLSearchParams(window.location.search);
      const keys = [
        "printReceiptData",
        "printReceipt",
        "lastReceipt",
        "repairReceipt",
        "printRepairReceipt"
      ];

      if (params.get("data")) {
        try {
          return JSON.parse(decodeURIComponent(params.get("data")));
        } catch (_) {}
      }

      for (const key of keys) {
        try {
          const local = localStorage.getItem(key);
          if (local) return JSON.parse(local);
        } catch (_) {}

        try {
          const session = sessionStorage.getItem(key);
          if (session) return JSON.parse(session);
        } catch (_) {}
      }

      return null;
    }

    function normalizeItems(data) {
      const rawItems = data.items || data.parts || data.products || [];

      return rawItems.map((item, index) => {
        const qty = num(item.qty ?? item.quantity ?? 1);
        const price = num(item.price ?? item.unitPrice ?? item.unit_price ?? 0);
        const total = num(item.total ?? (qty * price));

        return {
          no: index + 1,
          code: item.barcode || item.code || item.sku || item.id || "",
          name: item.name || item.title || item.itemName || "-",
          qty,
          price,
          total
        };
      });
    }

    function normalizeReceipt(data) {
      const items = normalizeItems(data || {});
      const laborCost = num(data?.laborCost ?? data?.serviceCharge ?? data?.service_cost ?? 0);
      const itemsTotal = num(
        data?.itemsTotal ??
        data?.subtotal ??
        data?.partsTotal ??
        items.reduce((sum, i) => sum + i.total, 0)
      );
      const discount = num(data?.discount ?? data?.discountAmount ?? data?.discount_amount ?? 0);
      const grandTotal = num(
        data?.grandTotal ??
        data?.total ??
        Math.max(0, itemsTotal + laborCost - discount)
      );
      const paid = num(data?.paid ?? data?.cash ?? data?.received ?? grandTotal);
      const change = num(data?.change ?? data?.changeAmount ?? Math.max(0, paid - grandTotal));
      const receiptId = data?.id || data?.saleId || data?.receiptId || data?.code || "-";
      const date = data?.created_at || data?.createdAt || data?.date || data?.repairDate || "-";
      const customerName = data?.customerName || data?.customer || data?.name || "-";
      const paymentMethod = data?.paymentMethod || data?.payment_method || "cash";

      return {
        receiptId,
        date,
        customerName,
        paymentMethod,
        items,
        itemsTotal,
        laborCost,
        discount,
        grandTotal,
        paid,
        change
      };
    }

    function renderReceipt(data) {
      const logoUrl = data?.logo || "/D.jpg";
      const r = normalizeReceipt(data || {});
      const root = document.getElementById("receiptRoot");

      const itemRows = r.items.map(item => `
        <div class="item">
          <div class="item-line-1">
            <div class="item-no">${item.no}</div>
            <div class="item-code">${esc(item.code ? "[" + item.code + "]" : "-")}</div>
            <div class="qty">${fmtMoney(item.qty)}</div>
            <div class="price">${fmtMoney(item.price)}</div>
            <div class="total">${fmtMoney(item.total)}</div>
          </div>
          <div class="item-name">${esc(item.name)}</div>
        </div>
      `).join("");

      const paymentLabel = paymentMethodLabel(r.paymentMethod);
      const paidLabel = paymentLabel === "เงินโอน" ? "ยอดโอน" : "รับเงิน";
      const paidAmount = paymentLabel === "เงินโอน"
        ? (r.paid > 0 ? r.paid : r.grandTotal)
        : r.paid;

      root.innerHTML = `
        <div class="center">
          <img class="logo" src="${logoUrl}" alt="logo" onerror="this.style.display='none'">
          <div class="shop-name">ดี อะไหล่ กรงปินัง</div>
          <div class="shop-sub">จำหน่ายอะไหล่มอเตอร์ไซค์</div>
          <div class="shop-tel">Tel: 081-766-7549</div>
        </div>

        <hr class="dash">

        <div class="title">ใบเสร็จรับเงิน</div>

        <div class="meta">
          <div class="meta-row">
            <div class="label">เลขที่:</div>
            <div>${esc(r.receiptId)}</div>
          </div>
          <div class="meta-row">
            <div class="label">วันที่:</div>
            <div>${esc(formatDateForReceipt(r.date))}</div>
          </div>
          <div class="meta-row">
            <div class="label">ลูกค้า:</div>
            <div>${esc(r.customerName || "-")}</div>
          </div>
          <div class="meta-row">
            <div class="label">ชำระ:</div>
            <div>${esc(paymentLabel)}</div>
          </div>
        </div>

        <hr class="dash">

        <div class="thead">
          <div>#</div>
          <div>รายการ</div>
          <div class="right">จำนวน</div>
          <div class="right">ราคา</div>
          <div class="right">รวม</div>
        </div>

        ${itemRows || `<div class="item"><div class="item-name">ไม่มีรายการ</div></div>`}

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>รวม ${fmtMoney(r.items.length)} รายการ</strong></div>
            <div><strong>${fmtMoney(r.itemsTotal)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ค่าบริการ</strong></div>
            <div><strong>${fmtMoney(r.laborCost)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ส่วนลด</strong></div>
            <div><strong>${fmtMoney(r.discount)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ยอดรวม</strong></div>
            <div><strong class="big">${fmtMoney(r.grandTotal)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>${paidLabel}</strong></div>
            <div><strong>${fmtMoney(paidAmount)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>เงินทอน</strong></div>
            <div><strong>${fmtMoney(r.change)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="thanks">ขอบคุณที่ใช้บริการ</div>
      `;
    }

    const data = getReceiptData();
    renderReceipt(data || {
      id: "-",
      date: "-",
      customerName: "-",
      paymentMethod: "cash",
      items: [],
      laborCost: 0,
      total: 0,
      paid: 0,
      change: 0
    });

    const params = new URLSearchParams(window.location.search);
    if (params.get("autoprint") === "1") {
      window.addEventListener("load", () => {
        setTimeout(() => window.print(), 300);
      });
    }
  </script>
</body>
</html>

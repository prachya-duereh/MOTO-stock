<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>พิมพ์ใบเสร็จ</title>
  <style>
    :root{
      --paper-width: 58mm;
      --text: #111;
      --line: #444;
      --bg: #eef1f4;
      --card: #ffffff;
      --green: #1f8f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: "Tahoma", "Noto Sans Thai", sans-serif;
      color: var(--text);
    }
    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 10px 40px;
    }
    .receipt-wrap {
      width: 100%;
      max-width: 300px;
    }
    .receipt {
      width: 100%;
      background: var(--card);
      border-radius: 18px;
      padding: 14px 12px 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      margin: 0 auto;
    }
    .center { text-align: center; }
    .logo {
      width: 54px;
      height: auto;
      display: block;
      margin: 0 auto 4px;
      object-fit: contain;
    }
    .shop-name {
      font-size: 27px;
      font-weight: 800;
      line-height: 1.1;
      margin: 2px 0 3px;
      letter-spacing: .2px;
    }
    .shop-sub {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }
    .shop-tel {
      font-size: 13px;
      margin-top: 2px;
      margin-bottom: 6px;
    }
    .dash {
      border: 0;
      border-top: 2px dashed var(--line);
      margin: 8px 0;
    }
    .title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin: 4px 0 8px;
      line-height: 1.1;
    }
    .meta {
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 6px;
    }
    .meta-row {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 6px;
      align-items: start;
    }
    .thead,
    .trow {
      display: grid;
      grid-template-columns: 22px 1fr 38px 44px 44px;
      gap: 4px;
      align-items: start;
    }
    .thead {
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .trow {
      margin: 3px 0 0;
      font-size: 12px;
    }
    .r { text-align: right; }
    .item-name {
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }
    .item-code {
      color: #333;
      line-height: 1.15;
      word-break: break-word;
    }
    .summary {
      font-size: 13px;
      line-height: 1.45;
    }
    .sum-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin: 1px 0;
    }
    .sum-row strong.big {
      font-size: 18px;
      font-weight: 800;
    }
    .thanks {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 6px;
    }
    .print-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 190px;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin: 14px auto 0;
      box-shadow: 0 6px 18px rgba(31,143,58,.25);
    }
    .print-btn:hover { filter: brightness(.96); }
    .print-area {
      width: var(--paper-width);
      margin: 0 auto;
    }
    @page {
      size: 58mm auto;
      margin: 0;
    }
    @media print {
      body { background: #fff; }
      .page {
        padding: 0;
        min-height: auto;
      }
      .receipt-wrap {
        max-width: none;
        width: var(--paper-width);
      }
      .receipt {
        width: var(--paper-width);
        border-radius: 0;
        box-shadow: none;
        padding: 6mm 4mm 6mm;
      }
      .print-btn { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="receipt-wrap">
      <div class="receipt print-area" id="receiptRoot"></div>
      <div class="center">
        <button class="print-btn" onclick="window.print()">พิมพ์เอกสาร</button>
      </div>
    </div>
  </div>

  <script>
    function num(v) {
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function fmtMoney(v) {
      const n = num(v);
      return Number.isInteger(n)
        ? n.toLocaleString("th-TH")
        : n.toLocaleString("th-TH", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function esc(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getReceiptData() {
      const params = new URLSearchParams(window.location.search);
      const keys = ["printReceiptData", "printReceipt", "lastReceipt", "repairReceipt", "printRepairReceipt"];

      if (params.get("data")) {
        try { return JSON.parse(decodeURIComponent(params.get("data"))); } catch (_) {}
      }

      for (const key of keys) {
        try {
          const local = localStorage.getItem(key);
          if (local) return JSON.parse(local);
        } catch (_) {}

        try {
          const session = sessionStorage.getItem(key);
          if (session) return JSON.parse(session);
        } catch (_) {}
      }

      return null;
    }

    function normalizeItems(data) {
      const rawItems = data.items || data.parts || data.products || [];
      return rawItems.map((item, index) => {
        const qty = num(item.qty ?? item.quantity ?? 1);
        const price = num(item.price ?? item.unitPrice ?? item.unit_price ?? 0);
        const total = num(item.total ?? (qty * price));
        return {
          no: index + 1,
          code: item.barcode || item.code || item.sku || item.id || "",
          name: item.name || item.title || item.itemName || "-",
          qty,
          price,
          total
        };
      });
    }

    function normalizeReceipt(data) {
      const items = normalizeItems(data);
      const laborCost = num(data.laborCost ?? data.serviceCharge ?? data.service_cost ?? 0);
      const itemsTotal = num(data.itemsTotal ?? data.subtotal ?? items.reduce((sum, i) => sum + i.total, 0));
      const grandTotal = num(data.grandTotal ?? data.total ?? (itemsTotal + laborCost));
      const paid = num(data.paid ?? data.cash ?? data.received ?? 0);
      const change = num(data.change ?? data.changeAmount ?? Math.max(0, paid - grandTotal));
      const receiptId = data.id || data.saleId || data.receiptId || data.code || "-";
      const date = data.created_at || data.createdAt || data.date || data.repairDate || "-";
      const customerName = data.customerName || data.customer || data.name || "-";

      return { receiptId, date, customerName, items, itemsTotal, laborCost, grandTotal, paid, change };
    }

    function renderReceipt(data) {
      const logoUrl = data.logo || "/logo.png";
      const r = normalizeReceipt(data);
      const root = document.getElementById("receiptRoot");

      const itemRows = r.items.map(item => `
        <div class="trow">
          <div>${item.no}</div>
          <div>
            <div class="item-code">${esc(item.code ? "[" + item.code + "]" : "")}</div>
            <div class="item-name">${esc(item.name)}</div>
          </div>
          <div class="r">${fmtMoney(item.qty)}</div>
          <div class="r">${fmtMoney(item.price)}</div>
          <div class="r">${fmtMoney(item.total)}</div>
        </div>
      `).join("");

      root.innerHTML = `
        <div class="center">
          <img class="logo" src="${logoUrl}" alt="logo" onerror="this.style.display='none'">
          <div class="shop-name">ดี อะไหล่ กรุงปัง</div>
          <div class="shop-sub">จำหน่ายอะไหล่มอเตอร์ไซค์</div>
          <div class="shop-tel">Tel: 081-766-7549</div>
        </div>

        <hr class="dash">
        <div class="title">ใบเสร็จรับเงิน</div>

        <div class="meta">
          <div class="meta-row"><div><strong>เลขที่:</strong></div><div>${esc(r.receiptId)}</div></div>
          <div class="meta-row"><div><strong>วันที่:</strong></div><div>${esc(r.date)}</div></div>
          <div class="meta-row"><div><strong>ลูกค้า:</strong></div><div>${esc(r.customerName || "-")}</div></div>
        </div>

        <hr class="dash">

        <div class="thead">
          <div>#</div>
          <div>รายการ</div>
          <div class="r">จำนวน</div>
          <div class="r">ราคา</div>
          <div class="r">รวม</div>
        </div>

        ${itemRows || `<div class="trow"><div>-</div><div>ไม่มีรายการ</div><div class="r">0</div><div class="r">0</div><div class="r">0</div></div>`}

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>รวม ${fmtMoney(r.items.length)} รายการ</strong></div>
            <div><strong>${fmtMoney(r.itemsTotal)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ค่าบริการ</strong></div>
            <div><strong>${fmtMoney(r.laborCost)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>ยอดรวม</strong></div>
            <div><strong class="big">${fmtMoney(r.grandTotal)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="summary">
          <div class="sum-row">
            <div><strong>รับเงิน</strong></div>
            <div><strong>${fmtMoney(r.paid)}</strong></div>
          </div>
          <div class="sum-row">
            <div><strong>เงินทอน</strong></div>
            <div><strong>${fmtMoney(r.change)}</strong></div>
          </div>
        </div>

        <hr class="dash">

        <div class="thanks">ขอบคุณที่ใช้บริการ</div>
      `;
    }

    const data = getReceiptData();
    if (data) {
      renderReceipt(data);
    } else {
      renderReceipt({ id: "-", date: "-", customerName: "-", items: [], laborCost: 0, total: 0, paid: 0, change: 0 });
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get("autoprint") === "1") {
      window.addEventListener("load", () => {
        setTimeout(() => window.print(), 300);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ใบเสร็จรับเงิน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f0f0f0;
      font-family: "Kanit", sans-serif;
      color: #111;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 10px;
    }

    .paper {
      width: 80mm;
      min-height: 100vh;
      background: #fff;
      padding: 10px 8px 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 2px;
    }

    .logo {
      max-width: 54px;
      max-height: 54px;
      object-fit: contain;
      display: inline-block;
    }

    .shop-name {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 2px;
    }

    .shop-sub {
      text-align: center;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
    }

    .shop-tel {
      text-align: center;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
    }

    .dash {
      border-top: 2px dashed #666;
      margin: 8px 0 6px;
    }

    .receipt-title {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      margin: 2px 0 6px;
    }

    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 14px;
      line-height: 1.35;
      margin: 1px 0;
    }

    .meta-label {
      width: 44px;
      flex: 0 0 44px;
      font-weight: 700;
    }

    .meta-value {
      flex: 1;
      word-break: break-word;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.25;
    }

    thead th {
      font-weight: 800;
      text-align: center;
      padding: 3px 2px;
    }

    tbody td {
      padding: 4px 2px;
      vertical-align: top;
    }

    .col-no { width: 22px; text-align: center; }
    .col-qty { width: 36px; text-align: center; }
    .col-price { width: 52px; text-align: right; }
    .col-total { width: 52px; text-align: right; }

    .item-name {
      font-weight: 700;
      line-height: 1.2;
    }

    .item-code {
      color: #444;
      line-height: 1.2;
    }

    .summary {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.35;
    }

    .sum-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 1px 0;
    }

    .sum-label {
      font-weight: 700;
    }

    .sum-value {
      text-align: right;
      min-width: 72px;
    }

    .sum-grand {
      font-size: 16px;
      font-weight: 800;
    }

    .footer {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .print-btn {
      border: none;
      background: #16a34a;
      color: #fff;
      border-radius: 10px;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .message {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      padding: 24px 8px;
    }

    .error {
      color: #b91c1c;
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        padding: 0;
      }

      .paper {
        width: 80mm;
        min-height: auto;
        box-shadow: none;
        padding: 6px 6px 10px;
      }

      .actions {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="paper">
      <div id="printArea" class="message">กำลังโหลดใบเสร็จ...</div>
      <div class="actions">
        <button class="print-btn" onclick="window.print()">พิมพ์บิล</button>
      </div>
    </div>
  </div>

  <script>
    function money(n) {
      return Number(n || 0).toLocaleString('th-TH', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getStoredReceipt() {
      const keys = ['lastReceipt', 'printReceipt', 'printData', 'lastRepairPrint'];
      for (const key of keys) {
        try {
          const a = localStorage.getItem(key);
          if (a) return JSON.parse(a);
        } catch (_) {}
        try {
          const b = sessionStorage.getItem(key);
          if (b) return JSON.parse(b);
        } catch (_) {}
      }
      return null;
    }

    function normalizeData(data) {
      if (!data) return null;

      // กรณี repair form / repair receipt เดิม
      if (data.type === 'repair_receipt' && data.repair) {
        const repair = data.repair;
        const extraLabor = Number(data.extraLabor || 0);
        const laborCost = Number(repair.laborCost || 0) + extraLabor;
        const items = Array.isArray(repair.parts) ? repair.parts.map(p => ({
          barcode: p.barcode || p.id || '-',
          name: p.name || '-',
          qty: Number(p.qty || 0),
          price: Number(p.unitPrice || 0),
          total: Number(p.total || 0)
        })) : [];

        const itemsTotal = Number(repair.partsCost || 0);
        return {
          saleId: repair.id || '-',
          date: repair.repairDate || repair.created_at || '-',
          customerName: repair.customerName || '-',
          items,
          itemsTotal,
          laborCost,
          total: itemsTotal + laborCost,
          paid: itemsTotal + laborCost,
          change: 0
        };
      }

      if (data.type === 'repair_form' && data.repair) {
        const repair = data.repair;
        const items = Array.isArray(repair.parts) ? repair.parts.map(p => ({
          barcode: p.barcode || p.id || '-',
          name: p.name || '-',
          qty: Number(p.qty || 0),
          price: Number(p.unitPrice || 0),
          total: Number(p.total || 0)
        })) : [];

        const itemsTotal = Number(repair.partsCost || 0);
        const laborCost = Number(repair.laborCost || 0);

        return {
          saleId: repair.id || '-',
          date: repair.repairDate || repair.created_at || '-',
          customerName: repair.customerName || '-',
          items,
          itemsTotal,
          laborCost,
          total: itemsTotal + laborCost,
          paid: itemsTotal + laborCost,
          change: 0
        };
      }

      // กรณีใบเสร็จขายจาก POS / report
      const items = Array.isArray(data.items) ? data.items.map(item => ({
        barcode: item.barcode || item.id || '-',
        name: item.name || '-',
        qty: Number(item.qty || 0),
        price: Number(item.price || item.unitPrice || 0),
        total: Number(item.total || 0)
      })) : [];

      const itemsTotal = data.itemsTotal != null
        ? Number(data.itemsTotal || 0)
        : items.reduce((sum, item) => sum + Number(item.total || 0), 0);

      return {
        saleId: data.saleId || data.id || data.code || '-',
        date: data.date || data.createdAt || data.repairDate || '-',
        customerName: data.customerName || '-',
        items,
        itemsTotal,
        laborCost: Number(data.laborCost || 0),
        total: Number(data.total || data.totalCost || data.grandTotal || 0),
        paid: Number(data.paid || 0),
        change: Number(data.change || 0)
      };
    }

    function renderReceipt(receipt) {
      const el = document.getElementById('printArea');
      const items = Array.isArray(receipt.items) ? receipt.items : [];
      const itemCount = items.reduce((sum, item) => sum + Number(item.qty || 0), 0);

      el.className = '';
      el.innerHTML = `
        <div class="logo-wrap">
          <img src="/D.jpg" alt="logo" class="logo" onerror="this.style.display='none'">
        </div>

        <div class="shop-name">ดี อะไหล่ กรุงปืนัง</div>
        <div class="shop-sub">จำหน่ายอะไหล่มอเตอร์ไซค์</div>
        <div class="shop-tel">Tel: 081-766-7549</div>

        <div class="dash"></div>

        <div class="receipt-title">ใบเสร็จรับเงิน</div>

        <div class="meta-row">
          <div class="meta-label">เลขที่:</div>
          <div class="meta-value">${escapeHtml(receipt.saleId || '-')}</div>
        </div>
        <div class="meta-row">
          <div class="meta-label">วันที่:</div>
          <div class="meta-value">${escapeHtml(receipt.date || '-')}</div>
        </div>
        <div class="meta-row">
          <div class="meta-label">ลูกค้า:</div>
          <div class="meta-value">${escapeHtml(receipt.customerName || '-')}</div>
        </div>

        <div class="dash"></div>

        <table>
          <thead>
            <tr>
              <th class="col-no">#</th>
              <th>รายการ</th>
              <th class="col-qty">จำนวน</th>
              <th class="col-price">ราคา</th>
              <th class="col-total">รวม</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((item, index) => `
              <tr>
                <td class="col-no">${index + 1}</td>
                <td>
                  <div class="item-code">[${escapeHtml(item.barcode || '-')} ]</div>
                  <div class="item-name">${escapeHtml(item.name || '-')}</div>
                </td>
                <td class="col-qty">${money(item.qty)}</td>
                <td class="col-price">${money(item.price)}</td>
                <td class="col-total">${money(item.total)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>

        <div class="dash"></div>

        <div class="summary">
          <div class="sum-row">
            <div class="sum-label">รวม ${money(itemCount)} รายการ</div>
            <div class="sum-value">${money(receipt.itemsTotal)}</div>
          </div>
          <div class="sum-row">
            <div class="sum-label">ค่าบริการ</div>
            <div class="sum-value">${money(receipt.laborCost)}</div>
          </div>
          <div class="sum-row sum-grand">
            <div class="sum-label">ยอดรวม</div>
            <div class="sum-value">${money(receipt.total)}</div>
          </div>
        </div>

        <div class="dash"></div>

        <div class="summary">
          <div class="sum-row">
            <div class="sum-label">รับเงิน</div>
            <div class="sum-value">${money(receipt.paid)}</div>
          </div>
          <div class="sum-row">
            <div class="sum-label">เงินทอน</div>
            <div class="sum-value">${money(receipt.change)}</div>
          </div>
        </div>

        <div class="dash"></div>

        <div class="footer">ขอบคุณที่ใช้บริการ</div>
      `;
    }

    function startup() {
      const stored = getStoredReceipt();
      const normalized = normalizeData(stored);

      if (!normalized) {
        const el = document.getElementById('printArea');
        el.className = 'message error';
        el.textContent = 'ไม่พบบิลสำหรับพิมพ์';
        return;
      }

      renderReceipt(normalized);
    }

    document.addEventListener('DOMContentLoaded', startup);
  </script>
</body>
</html>

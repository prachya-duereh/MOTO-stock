<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Print</title>

<style>
  body {
    margin: 0;
    font-family: "Courier New", monospace;
    font-size: 12px;
  }

  .receipt {
    width: 58mm;
    padding: 5px;
  }

  .center { text-align: center; }
  .left { text-align: left; }
  .right { text-align: right; }

  .row {
    display: flex;
    justify-content: space-between;
  }

  hr {
    border: none;
    border-top: 1px dashed #000;
    margin: 4px 0;
  }

  @media print {
    body { margin: 0; }
  }
</style>
</head>

<body>
<div class="receipt" id="receipt"></div>

<script>
function formatMoney(n) {
  if (!n) return "0";
  return Number(n).toString().replace(/\\.00$/, "");
}

function render(receipt) {
  const el = document.getElementById("receipt");

  let html = "";

  html += `
    <div class="center">
      <b>ดี อะไหล่ กรุงปัง</b><br>
      Tel: 081-766-7549
    </div>

    <hr>

    <div>เลขที่: ${receipt.id || "-"}</div>
    <div>วันที่: ${receipt.date || "-"}</div>
  `;

  if (receipt.customerName) {
    html += `<div>ลูกค้า: ${receipt.customerName}</div>`;
  }

  html += `<hr>`;

  (receipt.items || []).forEach(i => {
    html += `
      <div>${i.name}</div>
      <div class="row">
        <span>${i.qty} x ${formatMoney(i.price)}</span>
        <span>${formatMoney(i.total)}</span>
      </div>
    `;
  });

  html += `<hr>`;

  html += `
    <div class="row">
      <span>รวม</span>
      <span>${formatMoney(receipt.total)}</span>
    </div>
  `;

  if (receipt.laborCost) {
    html += `
      <div class="row">
        <span>ค่าแรง</span>
        <span>${formatMoney(receipt.laborCost)}</span>
      </div>
    `;
  }

  html += `
    <div class="row">
      <b>ยอดรวม</b>
      <b>${formatMoney(receipt.grandTotal || receipt.total)}</b>
    </div>
  `;

  if (receipt.paid) {
    html += `
      <div class="row">
        <span>รับเงิน</span>
        <span>${formatMoney(receipt.paid)}</span>
      </div>

      <div class="row">
        <span>เงินทอน</span>
        <span>${formatMoney(receipt.change)}</span>
      </div>
    `;
  }

  html += `
    <hr>
    <div class="center">ขอบคุณที่ใช้บริการ</div>
  `;

  el.innerHTML = html;
}

// โหลดข้อมูล
let data = localStorage.getItem("printReceiptData");

if (data) {
  render(JSON.parse(data));
}

// พิมพ์อัตโนมัติ
setTimeout(() => {
  window.print();
}, 300);
</script>
</body>
</html>

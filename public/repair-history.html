<!doctype html>
<html lang="th">
  <head>
    <link rel="icon" type="image/jpg" href="D.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ประวัติการซ่อม</title>
    <style>
      *{box-sizing:border-box;font-family:"Kanit",sans-serif}
      body{margin:0;background:#eef2f7;color:#1f2937}
      .page{padding:16px}.topbar,.panel{background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
      .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 18px;margin-bottom:16px}
      .nav{display:flex;gap:10px;flex-wrap:wrap}.nav button,button{border:none;border-radius:12px;cursor:pointer}.nav button{background:#2563eb;color:#fff;padding:11px 14px}
      .grid{display:grid;grid-template-columns:40% 60%;gap:16px}.panel{padding:16px}
      input,textarea,select{width:100%;padding:13px;border:1px solid #d5dbe4;border-radius:12px;font-size:15px} textarea{min-height:110px;resize:vertical}
      .title{font-size:20px;font-weight:700;margin-bottom:10px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.parts-box,.record{border:1px solid #e5e7eb;border-radius:14px;background:#fbfdff}
      .parts-box{padding:10px;margin-top:8px}.part-row{border-bottom:1px solid #e5e7eb;padding:8px 0}.part-row:last-child{border-bottom:none}
      .price-mode{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 10px}.price-mode button{padding:12px;background:#dbeafe;color:#1d4ed8;font-weight:700}.price-mode .active{background:#2563eb;color:#fff}
      .tool-row,.record-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.record-actions{grid-template-columns:repeat(4,1fr)}
      .save{background:#2563eb;color:#fff;padding:13px;font-weight:700;width:100%;margin-top:10px}.print{background:#16a34a;color:#fff;padding:12px;font-weight:700}.print2{background:#0f766e;color:#fff;padding:12px;font-weight:700}.edit{background:#f59e0b;color:#fff;padding:12px;font-weight:700}.danger{background:#dc2626;color:#fff;padding:12px;font-weight:700}.small{background:#16a34a;color:#fff;padding:12px;font-weight:700;width:100%}
      .muted{color:#6b7280}.tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px}.total-box{font-weight:700;font-size:18px;margin-top:10px}
      @media (max-width:1100px){.grid,.split,.tool-row,.record-actions,.price-mode{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div class="title">ประวัติการซ่อมรถลูกค้า</div>
        <div class="nav">
          <button onclick="location.href='/pos.html'">หน้าร้าน</button>
          <button onclick="location.href='/admin.html'">หลังบ้าน</button>
          <button onclick="location.href='/report.html'">รายงาน</button>
          <button onclick="logout()" style="background:#dc2626">ออกจากระบบ</button>
        </div>
      </div>
      <div class="grid">
        <div class="panel">
          <div class="title" id="formTitle">บันทึกประวัติใหม่</div>
          <input id="customerName" placeholder="ชื่อลูกค้า" />
          <div class="split">
            <input id="phone" placeholder="เบอร์โทร" />
            <input id="plate" placeholder="ทะเบียนรถ" />
          </div>
          <div class="split">
            <input id="bikeModel" placeholder="รุ่นรถ" />
            <input id="repairDate" type="date" />
          </div>
          <textarea id="symptom" placeholder="อาการ / งานซ่อม"></textarea>

          <div class="title" style="font-size:18px">เลือกประเภทราคาอะไหล่</div>
          <div class="price-mode">
            <button id="repair-price-retail" onclick="setRepairPriceType('retail')">ราคาปลีก</button>
            <button id="repair-price-wholesale" onclick="setRepairPriceType('wholesale')">ราคาส่ง</button>
            <button id="repair-price-mechanic" class="active" onclick="setRepairPriceType('mechanic')">ราคาช่าง</button>
          </div>

          <div class="split">
            <input id="partSearch" placeholder="ค้นหาอะไหล่" oninput="renderPartOptions()" />
            <select id="paperSize" onchange="savePaperSize()"><option value="58">ใบเสร็จ 58 mm</option><option value="80">ใบเสร็จ 80 mm</option></select>
          </div>
          <select id="partSelect"></select>
          <div class="split">
            <input id="partQty" type="number" placeholder="จำนวน" value="1" />
            <button class="small" onclick="addPart()">เพิ่มอะไหล่</button>
          </div>

          <div class="parts-box">
            <div style="font-weight:700">อะไหล่ที่ใช้</div>
            <div id="partsList">ยังไม่มีอะไหล่</div>
          </div>

          <input id="laborCost" type="number" placeholder="ค่าแรง" oninput="updateTotals()" />
          <div class="total-box" id="partsCostText">ค่าอะไหล่: 0 บาท</div>
          <div class="total-box" id="totalCostText">รวมเงิน: 0 บาท</div>
          <textarea id="note" placeholder="หมายเหตุเพิ่มเติม"></textarea>

          <button class="save" onclick="saveRepair()">บันทึกประวัติ</button>
          <div class="tool-row">
            <button class="print" onclick="printCurrentRepairForm()">พิมพ์ใบรับซ่อม</button>
            <button class="print2" onclick="printCurrentRepairReceipt()">พิมพ์ใบเสร็จจากฟอร์ม</button>
          </div>
        </div>

        <div class="panel">
          <div class="title">ค้นหาประวัติ</div>
          <input id="searchRepair" placeholder="ค้นหาชื่อลูกค้า เบอร์ รุ่นรถ ทะเบียน อาการ อะไหล่" oninput="loadRepairs()" />
          <div id="repairList" style="margin-top:10px"></div>
        </div>
      </div>
    </div>

    <script>
      let items = []; let selectedParts = []; let repairPriceType = 'mechanic'; let repairsCache = []; let editingRepairId = null;
      function $(id){ return document.getElementById(id); }
      function money(n){ return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}); }
      async function api(url, options){ const res=await fetch(url,options); const text=await res.text(); let data={}; try{ data=text?JSON.parse(text):{}; }catch{ throw new Error(text||'server ส่งข้อมูลไม่ถูกต้อง'); } if(!res.ok||data.success===false) throw new Error(data.message||'เกิดข้อผิดพลาด'); return data; }
      function savePaperSize(){ localStorage.setItem('paperSize',$('paperSize').value); }
      function getPaperSize(){ return localStorage.getItem('paperSize') || '58'; }
      function getRepairPriceLabel(type=repairPriceType){ return type==='retail'?'ราคาปลีก':type==='wholesale'?'ราคาส่ง':type==='mechanic'?'ราคาช่าง':'หลายราคา'; }
      function getRepairUnitPrice(item,type=repairPriceType){ if(type==='retail') return Number(item.retailPrice||0); if(type==='wholesale') return Number(item.wholesalePrice||0); return Number(item.mechanicPrice||item.retailPrice||0); }
      function setRepairPriceType(type){ repairPriceType=type; ['retail','wholesale','mechanic'].forEach((t)=>$('repair-price-'+t).classList.remove('active')); $('repair-price-'+type).classList.add('active'); renderPartOptions(); }
      async function loadItems(){ items = await api('/api/items'); renderPartOptions(); }
      function renderPartOptions(){ const keyword=$('partSearch').value.trim().toLowerCase(); const filtered=items.filter((item)=>[item.name,item.barcode,item.category,item.model,item.year,item.note].join(' ').toLowerCase().includes(keyword)); $('partSelect').innerHTML = filtered.length ? filtered.map((item)=>`<option value="${item.id}">${item.name} [${item.barcode || '-'}] | ${getRepairPriceLabel(repairPriceType)} ${money(getRepairUnitPrice(item,repairPriceType))} | คงเหลือ ${money(item.quantity)}</option>`).join('') : '<option value="">ไม่พบสินค้า</option>'; }
      function addPart(){ const id=Number($('partSelect').value); const qty=Number($('partQty').value)||0; const item=items.find((i)=>i.id===id); if(!item) return alert('ไม่พบสินค้า'); if(qty<=0) return alert('จำนวนไม่ถูกต้อง'); const usedQty=selectedParts.filter((p)=>p.id===id).reduce((sum,p)=>sum+Number(p.qty||0),0); if(usedQty+qty>Number(item.quantity||0)) return alert('จำนวนเกินสต๊อก'); selectedParts.push({ id:Number(item.id), barcode:item.barcode||'', name:item.name||'', qty, priceType:repairPriceType, priceLabel:getRepairPriceLabel(repairPriceType), unitPrice:getRepairUnitPrice(item,repairPriceType), total:getRepairUnitPrice(item,repairPriceType)*qty }); $('partQty').value=1; renderSelectedParts(); }
      function removePart(index){ selectedParts.splice(index,1); renderSelectedParts(); }
      function renderSelectedParts(){ if(!selectedParts.length){ $('partsList').innerHTML='ยังไม่มีอะไหล่'; updateTotals(); return; } $('partsList').innerHTML=selectedParts.map((p,index)=>`<div class="part-row"><b>${p.name}</b> [${p.barcode||'-'}] <span class="tag">${p.priceLabel}</span><div>จำนวน ${money(p.qty)} | หน่วยละ ${money(p.unitPrice)} | รวม ${money(p.total)}</div><button class="danger" style="margin-top:6px;padding:8px 10px" onclick="removePart(${index})">ลบ</button></div>`).join(''); updateTotals(); }
      function updateTotals(){ const partsCost = selectedParts.reduce((sum,p)=>sum+Number(p.total||0),0); const labor = Number($('laborCost').value)||0; $('partsCostText').innerText='ค่าอะไหล่: '+money(partsCost)+' บาท'; $('totalCostText').innerText='รวมเงิน: '+money(partsCost+labor)+' บาท'; }
      function currentRepairPayload(){ const parts = selectedParts.map((p)=>({ id:p.id, barcode:p.barcode, name:p.name, qty:Number(p.qty||0), unitPrice:Number(p.unitPrice||0), total:Number(p.total||0), priceType:p.priceType, priceLabel:p.priceLabel })); const partsCost = parts.reduce((sum,p)=>sum+Number(p.total||0),0); const labor = Number($('laborCost').value)||0; const distinctTypes = [...new Set(parts.map((p)=>p.priceType))]; const effectiveType = distinctTypes.length===1 ? distinctTypes[0] : 'mixed'; return { customerName:$('customerName').value.trim(), phone:$('phone').value.trim(), bikeModel:$('bikeModel').value.trim(), plate:$('plate').value.trim(), repairDate:$('repairDate').value, symptom:$('symptom').value.trim(), parts, partsCost, laborCost:labor, totalCost:partsCost+labor, note:$('note').value.trim(), repairPriceType:effectiveType, repairPriceLabel:getRepairPriceLabel(effectiveType) }; }
      function openPrint(data){ localStorage.setItem('printData', JSON.stringify(data)); window.open('/print.html?v='+Date.now()+'&paper='+encodeURIComponent(getPaperSize()), '_blank'); }
      function printCurrentRepairForm(){ const record=currentRepairPayload(); if(!record.customerName) return alert('กรุณาใส่ชื่อลูกค้า'); openPrint({ type:'repair_form', repair:record, paperSize:getPaperSize() }); }
    
      function resetRepairForm(){ editingRepairId=null; $('formTitle').innerText='บันทึกประวัติใหม่'; ['customerName','phone','bikeModel','plate','repairDate','symptom','laborCost','note','partSearch'].forEach((id)=>$(id).value=''); $('partQty').value=1; selectedParts=[]; setRepairPriceType('mechanic'); renderSelectedParts(); }
      async function saveRepair(){ try{ const payload = currentRepairPayload(); if(!payload.customerName) return alert('กรุณาใส่ชื่อลูกค้า'); if(!payload.parts.length) return alert('กรุณาเลือกอะไหล่'); const url = editingRepairId ? '/api/repairs/'+editingRepairId : '/api/repairs'; const method = editingRepairId ? 'PUT' : 'POST'; await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); resetRepairForm(); await loadItems(); await loadRepairs(); }catch(err){ alert(err.message); } }
      async function loadRepairs(){ try{ const q = $('searchRepair').value.trim(); repairsCache = await api(q ? '/api/repairs?q='+encodeURIComponent(q) : '/api/repairs'); $('repairList').innerHTML = repairsCache.length ? repairsCache.map((r)=>{ const partsHtml = Array.isArray(r.parts)&&r.parts.length ? r.parts.map((p)=>`<div>[${p.barcode || '-'}] ${p.name} x${money(p.qty)} <span class="tag">${p.priceLabel || getRepairPriceLabel(p.priceType)}</span> หน่วยละ ${money(p.unitPrice)} รวม ${money(p.total)}</div>`).join('') : (r.partsUsedText || '-'); return `<div class="record" style="padding:12px;margin-bottom:10px"><div style="font-size:18px;font-weight:700">${r.customerName || '-'}</div><div>เบอร์โทร: ${r.phone || '-'} | ทะเบียน: ${r.plate || '-'}</div><div>รุ่นรถ: ${r.bikeModel || '-'} | วันที่: ${formatThaiDate(r.repairDate)}</div><div style="margin-top:6px"><b>อาการ / งานซ่อม</b><br>${r.symptom || '-'}</div><div style="margin-top:6px"><b>อะไหล่ที่ใช้</b><br>${partsHtml}</div><div style="margin-top:6px">ค่าอะไหล่ ${money(r.partsCost)} | ค่าแรง ${money(r.laborCost)} | <b>รวม ${money(r.totalCost)}</b></div><div>หมายเหตุ: ${r.note || '-'}</div><input id="extra-labor-${r.id}" type="number" placeholder="ค่าแรงเพิ่มก่อนพิมพ์ใบเสร็จ (ถ้ามี)" style="margin-top:8px" /><div class="record-actions"><button class="print" onclick="printRepairForm(${r.id})">พิมพ์ใบรับซ่อม</button><button class="print2" onclick="printRepairReceipt(${r.id})">พิมพ์ใบเสร็จ</button><button class="edit" onclick="editRepair(${r.id})">แก้ไข</button><button class="danger" onclick="deleteRepair(${r.id})">ลบ</button></div></div>`; }).join('') : '<div class="muted">ยังไม่มีประวัติการซ่อม</div>'; }catch(err){ $('repairList').innerHTML='<div class="muted">'+err.message+'</div>'; } }
      function findRepair(id){ return repairsCache.find((r)=>r.id===Number(id)); }
      function printRepairForm(id){ const record=findRepair(id); if(!record) return; localStorage.setItem('lastRepairPrint', JSON.stringify({ type:'repair_form', repair:record, paperSize:getPaperSize() })); openPrint({ type:'repair_form', repair:record, paperSize:getPaperSize() }); }
      function printRepairReceipt(id){
  const record = findRepair(id);
  if(!record) return;

  const extraLabor = Number($('extra-labor-'+id).value) || 0;

  const receipt = {
    saleId: record.id || '-',
    date: record.repairDate || record.created_at || '-',
    customerName: record.customerName || '-',
    items: Array.isArray(record.parts) ? record.parts.map(p => ({
      barcode: p.barcode || p.id || '-',
      name: p.name || '-',
      qty: Number(p.qty || 0),
      price: Number(p.unitPrice || 0),
      total: Number(p.total || 0)
    })) : [],
    itemsTotal: Number(record.partsCost || 0),
    laborCost: Number(record.laborCost || 0) + extraLabor,
    total: Number(record.partsCost || 0) + Number(record.laborCost || 0) + extraLabor,
    paid: Number(record.partsCost || 0) + Number(record.laborCost || 0) + extraLabor,
    change: 0
  };

  try {
    localStorage.setItem('lastReceipt', JSON.stringify(receipt));
    sessionStorage.setItem('lastReceipt', JSON.stringify(receipt));
    localStorage.setItem('printReceipt', JSON.stringify(receipt));
    sessionStorage.setItem('printReceipt', JSON.stringify(receipt));
  } catch (error) {}

  window.open('/print.html', '_blank');
}
function formatThaiDate(dateStr, withSeconds = false) {
  if (!dateStr) return '-';

  if (/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr))) {
    return String(dateStr);
  }

  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);

  const parts = new Intl.DateTimeFormat('sv-SE', {
    timeZone: 'Asia/Bangkok',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    ...(withSeconds ? { second: '2-digit' } : {}),
    hour12: false
  }).formatToParts(d);

  const get = (type) => parts.find((p) => p.type === type)?.value || '';
  return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}${withSeconds ? ':' + get('second') : ''}`;
}
      function editRepair(id){ const record=findRepair(id); if(!record) return alert('ไม่พบประวัติ'); editingRepairId=Number(id); $('formTitle').innerText='แก้ไขประวัติ #' + id; $('customerName').value=record.customerName||''; $('phone').value=record.phone||''; $('bikeModel').value=record.bikeModel||''; $('plate').value=record.plate||''; $('repairDate').value=record.repairDate||''; $('symptom').value=record.symptom||''; $('laborCost').value=Number(record.laborCost||0)||''; $('note').value=record.note||''; selectedParts = (record.parts || []).map((p)=>({ id:Number(p.id), barcode:p.barcode||'', name:p.name||'', qty:Number(p.qty||0), priceType:p.priceType || record.repairPriceType || 'mechanic', priceLabel:p.priceLabel || getRepairPriceLabel(p.priceType || record.repairPriceType || 'mechanic'), unitPrice:Number(p.unitPrice||0), total:Number(p.total || Number(p.unitPrice||0)*Number(p.qty||0)) })); renderSelectedParts(); window.scrollTo({ top:0, behavior:'smooth' }); }
      async function deleteRepair(id){ if(!confirm('ต้องการลบประวัตินี้ใช่หรือไม่? การลบจะคืนสต๊อกอะไหล่กลับด้วย')) return; try{ await api('/api/repairs/'+id,{method:'DELETE'}); await loadItems(); await loadRepairs(); }catch(err){ alert(err.message); } }
      async function logout(){ try{ await fetch('/api/logout',{method:'POST'});}catch{} location.href='/login.html'; }
      (async function checkAuth(){ try{ const res=await fetch('/api/auth/me'); if(!res.ok) location.href='/login.html'; }catch{ location.href='/login.html'; }})();
      (async function startup(){ $('paperSize').value=getPaperSize(); try{ await loadItems(); await loadRepairs(); }catch(err){ $('repairList').innerHTML='<div class="muted">'+err.message+'</div>'; } renderSelectedParts(); })();
    </script>
  </body>
</html>
